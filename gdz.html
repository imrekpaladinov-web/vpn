<!DOCTYPE html>
<html lang="ce">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost AI — ГДЗ Нохчийн Маттахь</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&display=swap');
        body { font-family: 'Google Sans', sans-serif; background-color: #ffffff; }
        .sidebar { background-color: #f0f4f9; transition: all 0.3s; }
        .gemini-gradient {
            background: linear-gradient(74deg, #4285f4 0%, #9b72cb 25%, #d96570 50%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .user-msg { background-color: #f0f4f9; border-radius: 1.5rem; padding: 12px 20px; max-width: 85%; align-self: flex-end; }
        .ai-msg-container { max-width: 800px; width: 100%; margin: 0 auto; }
        .ghost-avatar {
            background: linear-gradient(135deg, #000 0%, #434343 100%);
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: white; font-size: 12px;
        }
        #chat-container::-webkit-scrollbar { width: 8px; }
        #chat-container::-webkit-scrollbar-thumb { background: #dfe3e7; border-radius: 10px; }
        .loading-dots:after { content: '.'; animation: dots 1.5s steps(5, end) infinite;}
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); } 40% { color: #666; text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); } 60% { text-shadow: .25em 0 0 #666, .5em 0 0 rgba(0,0,0,0); } 80%, 100% { text-shadow: .25em 0 0 #666, .5em 0 0 #666; } }
        .chat-image { max-width: 250px; border-radius: 12px; margin-bottom: 8px; border: 1px solid #e5e7eb; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="sidebar w-64 flex-col hidden md:flex p-4">
        <button onclick="location.reload()" class="flex items-center gap-3 bg-[#e6eaf1] hover:bg-gray-200 p-4 rounded-2xl mb-8 transition w-full">
            <i class="fa-solid fa-plus text-gray-600"></i>
            <span class="text-sm font-medium">Керла чат</span>
        </button>
        <div class="flex-1 overflow-y-auto">
            <p class="text-xs font-semibold text-gray-500 mb-4 px-2 uppercase tracking-wider">История</p>
            <div id="history-list" class="space-y-1"></div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative">
        <header class="p-4 flex justify-between items-center bg-white/80 backdrop-blur-md sticky top-0 z-10 border-b border-gray-100">
            <div class="flex items-center gap-3">
                <span class="text-xl font-medium tracking-tight text-gray-700">Ghost AI</span>
                <span class="text-[10px] bg-black text-white px-2 py-0.5 rounded-full font-bold">PRO</span>
            </div>
            <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white text-xs shadow-sm">U</div>
        </header>

        <div id="chat-container" class="flex-1 overflow-y-auto px-4 md:px-10 py-6">
            <div id="welcome-view" class="flex flex-col items-center justify-center h-full mt-[-50px]">
                <h1 class="text-4xl md:text-5xl font-medium gemini-gradient mb-10 text-center">Де дика дойла, со Ghost AI ю</h1>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 max-w-3xl w-full">
                    <div onclick="window.fillInput('Математика: 5 класс, 125-гIа номер йе хьуна')" class="p-4 bg-[#f0f4f9] rounded-xl text-sm hover:bg-gray-200 cursor-pointer transition">Математика гIо де</div>
                    <div onclick="window.fillInput('Нохчийн мотт: Сочинение язъе «Сан Даймохк»')" class="p-4 bg-[#f0f4f9] rounded-xl text-sm hover:bg-gray-200 cursor-pointer transition">Сочинение язъе</div>
                    <div onclick="window.fillInput('Истори: Шайх Мансурах лаьцна дийца')" class="p-4 bg-[#f0f4f9] rounded-xl text-sm hover:bg-gray-200 cursor-pointer transition">Истори дийца</div>
                </div>
            </div>
            <div id="messages-list" class="space-y-8 flex flex-col"></div>
        </div>

        <div class="p-4 bg-white">
            <div class="max-w-3xl mx-auto relative">
                <div class="bg-[#f0f4f9] rounded-[28px] p-3 focus-within:bg-white focus-within:shadow-lg border border-transparent focus-within:border-gray-200 transition-all flex flex-col">
                    
                    <div id="imagePreviewContainer" class="hidden px-3 pb-2 pt-1">
                        <div class="relative inline-block">
                            <img id="previewImg" src="" class="h-16 w-16 object-cover rounded-lg border border-gray-300 shadow-sm">
                            <button onclick="window.removeImage()" class="absolute -top-2 -right-2 bg-red-500 hover:bg-red-600 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs transition shadow-md">
                                <i class="fa-solid fa-xmark"></i>
                            </button>
                        </div>
                    </div>

                    <textarea id="userInput" rows="1" class="w-full bg-transparent border-none focus:ring-0 p-3 resize-none text-gray-800" placeholder="Хазза язъе кхузахь хьайна оьшург..."></textarea>
                    
                    <div class="flex justify-between items-center px-2 pt-2 border-t border-gray-200/50 mt-1">
                        <div class="flex gap-4">
                            <label class="cursor-pointer text-gray-500 hover:text-blue-600 transition">
                                <i class="fa-regular fa-image text-xl"></i>
                                <input type="file" id="imageInput" class="hidden" accept="image/*">
                            </label>
                            <button id="micBtn" onclick="window.startVoice()" class="text-gray-500 hover:text-blue-600 transition">
                                <i class="fa-solid fa-microphone text-xl"></i>
                            </button>
                        </div>
                        <button onclick="window.sendMessage()" id="sendBtn" class="bg-white p-2 px-4 rounded-full shadow-sm hover:bg-gray-100 text-blue-600 transition">
                            <i class="fa-solid fa-paper-plane text-lg"></i>
                        </button>
                    </div>
                </div>
                <p class="text-[10px] text-center text-gray-400 mt-3 uppercase tracking-tighter italic">Ghost AI — Кхуо гIалат дан тарло. Тергам бе.</p>
            </div>
        </div>
    </main>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        const API_KEY = "AIzaSyB3O_Vj1iZ12Z7JHrc1_c2eCZ6NwlJOAGI";
        const genAI = new GoogleGenerativeAI(API_KEY);

        const userInput = document.getElementById('userInput');
        const messagesList = document.getElementById('messages-list');
        const welcomeView = document.getElementById('welcome-view');
        const historyList = document.getElementById('history-list');
        const imageInput = document.getElementById('imageInput');
        
        let currentImagePart = null;
        let currentImageSrc = null;

        // --- Глобальная регистрация функций ---
        window.fillInput = (text) => {
            userInput.value = text;
            userInput.focus();
        };

        window.removeImage = () => {
            currentImagePart = null;
            currentImageSrc = null;
            imageInput.value = '';
            document.getElementById('imagePreviewContainer').classList.add('hidden');
        };

        window.startVoice = () => {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("Хьан браузерехь микрофон ца болх бо.");
                return;
            }
            const recognition = new SpeechRecognition();
            recognition.lang = 'ru-RU';
            
            recognition.onstart = () => {
                userInput.placeholder = "ЛадугIуш ду...";
                document.getElementById('micBtn').classList.replace('text-gray-500', 'text-red-500');
            };
            
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                userInput.value += (userInput.value ? ' ' : '') + transcript;
            };
            
            recognition.onend = () => {
                userInput.placeholder = "Хазза язъе кхузахь хьайна оьшург...";
                document.getElementById('micBtn').classList.replace('text-red-500', 'text-gray-500');
            };
            recognition.start();
        };

        // Логика выбора фото
        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                currentImageSrc = event.target.result;
                const base64Data = currentImageSrc.split(',')[1];
                currentImagePart = {
                    inlineData: { data: base64Data, mimeType: file.type }
                };
                document.getElementById('previewImg').src = currentImageSrc;
                document.getElementById('imagePreviewContainer').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        });

        window.sendMessage = async () => {
            const text = userInput.value.trim();
            if (!text && !currentImagePart) return;

            welcomeView.classList.add('hidden');
            
            // UI пользователя
            let userContent = '';
            if (currentImageSrc) userContent += `<img src="${currentImageSrc}" class="chat-image">`;
            if (text) userContent += `<div>${text}</div>`;
            appendMessage('user', userContent);
            
            // Подготовка запроса
            const promptData = currentImagePart ? [text || "Что на этом фото?", currentImagePart] : [text];
            
            // Очистка
            const textForHistory = text || "Сурт";
            userInput.value = '';
            window.removeImage();
            
            const aiWrapper = appendMessage('ai', '<span class="loading-dots">Ойла йо</span>');

            try {
                const model = genAI.getGenerativeModel({ 
                    model: "gemini-1.5-flash",
                    systemInstruction: "Ты - Ghost AI. Помогай чеченским школьникам. Отвечай ВСЕГДА на чеченском языке. Будь четким и умным."
                });

                const result = await model.generateContent(promptData);
                const responseText = await result.response.text();
                
                renderAIResponse(aiWrapper, responseText);
                if(text) saveToHistory(textForHistory);

            } catch (error) {
                aiWrapper.querySelector('.prose').innerHTML = `<span class="text-red-500 text-xs text-left">ГIалат: ${error.message}</span>`;
                console.error(error);
            }
        };

        // --- Вспомогательные функции ---
        function appendMessage(role, content) {
            const wrapper = document.createElement('div');
            wrapper.className = role === 'user' ? 'flex justify-end w-full animate-fade-in' : 'ai-msg-container flex gap-4 w-full';
            
            if (role === 'user') {
                wrapper.innerHTML = `<div class="user-msg shadow-sm flex flex-col">${content}</div>`;
            } else {
                wrapper.innerHTML = `
                    <div class="ghost-avatar flex-shrink-0 mt-1 shadow-md">G</div>
                    <div class="flex-1 overflow-hidden">
                        <div class="prose prose-blue text-gray-800 leading-relaxed max-w-none break-words">${content}</div>
                    </div>`;
            }
            messagesList.appendChild(wrapper);
            const container = document.getElementById('chat-container');
            container.scrollTo({top: container.scrollHeight, behavior: 'smooth'});
            return wrapper;
        }

        function renderAIResponse(container, text) {
            const contentDiv = container.querySelector('.prose');
            // Базовый форматтер для Markdown
            const html = text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/\n/g, '<br>');
                
            contentDiv.innerHTML = html;
            const actionDiv = document.createElement('div');
            actionDiv.className = 'flex gap-4 mt-3 text-gray-400 text-sm';
            actionDiv.innerHTML = `
                <button onclick="window.copyThis(this)" class="hover:text-blue-600 transition"><i class="fa-regular fa-copy"></i></button>
            `;
            contentDiv.after(actionDiv);
        }

        window.copyThis = (btn) => {
            const text = btn.closest('.ai-msg-container').querySelector('.prose').innerText;
            navigator.clipboard.writeText(text);
            btn.innerHTML = '<i class="fa-solid fa-check text-green-500"></i>';
            setTimeout(() => btn.innerHTML = '<i class="fa-regular fa-copy"></i>', 2000);
        };

        function saveToHistory(q) {
            let history = JSON.parse(localStorage.getItem('ghost_history') || '[]');
            if(!history.includes(q)) {
                history.unshift(q);
                history = history.slice(0, 10);
                localStorage.setItem('ghost_history', JSON.stringify(history));
                updateHistoryUI();
            }
        }

        function updateHistoryUI() {
            historyList.innerHTML = '';
            const saved = JSON.parse(localStorage.getItem('ghost_history') || '[]');
            saved.forEach(text => {
                const item = document.createElement('div');
                item.className = 'p-3 text-sm text-gray-600 hover:bg-gray-200 rounded-xl cursor-pointer truncate transition mb-1';
                item.innerHTML = `<i class="fa-regular fa-message mr-2 opacity-50"></i> ${text}`;
                item.onclick = () => { userInput.value = text; window.sendMessage(); };
                historyList.appendChild(item);
            });
        }

        window.onload = updateHistoryUI;

        userInput.addEventListener('keydown', (e) => { 
            if(e.key === 'Enter' && !e.shiftKey) { 
                e.preventDefault(); 
                window.sendMessage(); 
            } 
        });
    </script>
</body>
</html>
