<!DOCTYPE html>
<html lang="ce">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost AI — Нохчийн ГIоьнча</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        .message-user { background-color: #f0f4f9; border-radius: 1.5rem; }
        .gemini-gradient { background: linear-gradient(74deg, #4285f4 0%, #9b72cb 20%, #d96570 40%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="bg-white h-screen flex overflow-hidden font-sans text-gray-800">

    <aside class="w-72 bg-[#f0f4f9] p-4 flex-col hidden md:flex">
        <button class="flex items-center gap-3 bg-[#e6eaf1] hover:bg-gray-200 p-3 rounded-full mb-8 transition">
            <i class="fa-solid fa-plus"></i>
            <span class="text-sm font-medium">Керла чат</span>
        </button>
        <div class="flex-1 overflow-y-auto">
            <p class="text-xs font-semibold text-gray-500 mb-4 px-2">ТIаьххьарниш (История)</p>
            <div id="chat-history" class="space-y-1">
                </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative">
        <header class="p-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-xl font-medium tracking-tight">Ghost AI</span>
                <span class="bg-blue-100 text-blue-700 text-[10px] px-1.5 py-0.5 rounded">Pro</span>
            </div>
            <div class="w-8 h-8 bg-purple-600 rounded-full flex items-center justify-center text-white text-xs">U</div>
        </header>

        <div id="chat-container" class="flex-1 overflow-y-auto px-4 md:px-24 py-8 space-y-8">
            <div class="max-w-3xl mx-auto text-center mt-20" id="welcome-screen">
                <h1 class="text-5xl font-medium gemini-gradient mb-8">Де дика дойла!</h1>
                <p class="text-gray-500">Муха гIо дан деза хьуна тахана?</p>
            </div>
        </div>

        <div class="p-4 md:px-24 pb-8">
            <div class="max-w-3xl mx-auto">
                <div class="bg-[#f0f4f9] rounded-3xl p-2 focus-within:bg-white focus-within:shadow-md transition">
                    <textarea id="userInput" rows="1" class="w-full bg-transparent border-none focus:ring-0 p-3 resize-none" placeholder="Язъе кхузахь..."></textarea>
                    <div class="flex justify-between items-center px-3 pb-2">
                        <div class="flex gap-4 text-gray-600">
                            <label class="cursor-pointer hover:text-blue-600 transition">
                                <i class="fa-regular fa-image text-xl"></i>
                                <input type="file" id="imageInput" class="hidden" accept="image/*">
                            </label>
                            <i class="fa-solid fa-microphone text-xl cursor-pointer hover:text-blue-600"></i>
                        </div>
                        <button onclick="handleSend()" class="text-blue-600 hover:scale-110 transition">
                            <i class="fa-solid fa-paper-plane text-xl"></i>
                        </button>
                    </div>
                </div>
                <p class="text-[11px] text-center text-gray-500 mt-3">Ghost AI может ошибаться. Проверяйте важную информацию.</p>
            </div>
        </div>
    </main>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        const API_KEY = "ВАШ_API_KEY"; 
        const genAI = new GoogleGenerativeAI(API_KEY);

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('userInput');
        const welcomeScreen = document.getElementById('welcome-screen');

        // Функция копирования текста
        window.copyText = (btn) => {
            const text = btn.parentElement.previousElementSibling.innerText;
            navigator.clipboard.writeText(text);
            btn.innerHTML = '<i class="fa-solid fa-check text-green-600"></i>';
            setTimeout(() => btn.innerHTML = '<i class="fa-regular fa-copy"></i>', 2000);
        };

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            if (welcomeScreen) welcomeScreen.remove();

            // Добавляем сообщение пользователя
            appendMessage('user', text);
            userInput.value = '';

            // Эффект загрузки (как у Gemini)
            const aiMsgDiv = appendMessage('ai', '...');
            
            try {
                const model = genAI.getGenerativeModel({ 
                    model: "gemini-1.5-flash",
                    systemInstruction: "Твое имя - Ghost AI. Ты - продвинутый интеллект, созданный для помощи чеченским школьникам. Ты всегда отвечаешь на чеченском языке, помогаешь с ГДЗ, математикой и историей."
                });

                const result = await model.generateContent(text);
                const responseText = result.response.text();
                
                aiMsgDiv.innerHTML = `
                    <div class="flex gap-4 max-w-3xl mx-auto">
                        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-400 to-purple-500 flex-shrink-0 mt-1"></div>
                        <div class="flex-1">
                            <div class="prose prose-slate">${responseText}</div>
                            <div class="flex gap-3 mt-4 text-gray-400">
                                <button onclick="copyText(this)" class="hover:text-gray-600"><i class="fa-regular fa-copy"></i></button>
                                <button class="hover:text-gray-600"><i class="fa-regular fa-thumbs-up"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                aiMsgDiv.innerText = "ГIалат девлла: " + error.message;
            }
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = role === 'user' ? 'flex justify-end mb-6' : 'mb-6';
            
            if (role === 'user') {
                div.innerHTML = `<div class="message-user px-5 py-3 max-w-[80%]">${text}</div>`;
            } else {
                div.innerHTML = `<div class="flex gap-4 max-w-3xl mx-auto animate-pulse">Бот ойла йо...</div>`;
            }
            
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }

        // Слушатель Enter
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });
    </script>
</body>
  </html>
