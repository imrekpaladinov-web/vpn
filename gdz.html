<!DOCTYPE html>
<html lang="ce">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost AI — ГДЗ Нохчийн Маттахь</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&display=swap');
        body { font-family: 'Google Sans', sans-serif; background-color: #ffffff; }
        .sidebar { background-color: #f0f4f9; transition: all 0.3s; }
        .gemini-gradient {
            background: linear-gradient(74deg, #4285f4 0%, #9b72cb 25%, #d96570 50%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .user-msg { background-color: #f0f4f9; border-radius: 1.5rem; padding: 12px 20px; max-width: 85%; align-self: flex-end; }
        .ai-msg-container { max-width: 800px; width: 100%; margin: 0 auto; }
        .ghost-avatar {
            background: linear-gradient(135deg, #000 0%, #434343 100%);
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: white; font-size: 12px;
        }
        #chat-container::-webkit-scrollbar { width: 8px; }
        #chat-container::-webkit-scrollbar-thumb { background: #dfe3e7; border-radius: 10px; }
        .loading-dots:after { content: '.'; animation: dots 1.5s steps(5, end) infinite;}
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); } 40% { color: #666; text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); } 60% { text-shadow: .25em 0 0 #666, .5em 0 0 rgba(0,0,0,0); } 80%, 100% { text-shadow: .25em 0 0 #666, .5em 0 0 #666; } }
        .chat-image { max-width: 250px; border-radius: 12px; margin-bottom: 8px; border: 1px solid #e5e7eb; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="sidebar w-64 flex-col hidden md:flex p-4 border-r border-gray-100">
        <button onclick="location.reload()" class="flex items-center gap-3 bg-[#e6eaf1] hover:bg-gray-200 p-4 rounded-2xl mb-8 transition w-full shadow-sm">
            <i class="fa-solid fa-plus text-gray-600"></i>
            <span class="text-sm font-medium">Керла чат</span>
        </button>
        <div class="flex-1 overflow-y-auto">
            <p class="text-xs font-semibold text-gray-400 mb-4 px-2 uppercase tracking-widest">История</p>
            <div id="history-list" class="space-y-1"></div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative bg-white">
        <header class="p-4 flex justify-between items-center bg-white/80 backdrop-blur-md sticky top-0 z-10 border-b border-gray-50">
            <div class="flex items-center gap-3">
                <span class="text-xl font-medium tracking-tight text-gray-800">Ghost AI</span>
                <span class="text-[10px] bg-blue-600 text-white px-2 py-0.5 rounded-full font-bold">PRO</span>
            </div>
            <div class="w-8 h-8 bg-gray-200 rounded-full flex items-center justify-center text-gray-500 text-xs">U</div>
        </header>

        <div id="chat-container" class="flex-1 overflow-y-auto px-4 md:px-10 py-6">
            <div id="welcome-view" class="flex flex-col items-center justify-center h-full mt-[-50px]">
                <h1 class="text-4xl md:text-5xl font-medium gemini-gradient mb-10 text-center">Де дика дойла, Ghost AI ю хьоьца</h1>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 max-w-3xl w-full">
                    <div onclick="window.fillInput('Математика гIо де')" class="p-4 bg-[#f0f4f9] rounded-xl text-sm hover:bg-gray-200 cursor-pointer transition border border-transparent hover:border-blue-200">Математика</div>
                    <div onclick="window.fillInput('Сочинение язъе «Сан Даймохк»')" class="p-4 bg-[#f0f4f9] rounded-xl text-sm hover:bg-gray-200 cursor-pointer transition border border-transparent hover:border-blue-200">Сочинение</div>
                    <div onclick="window.fillInput('Истори дийца')" class="p-4 bg-[#f0f4f9] rounded-xl text-sm hover:bg-gray-200 cursor-pointer transition border border-transparent hover:border-blue-200">Истори</div>
                </div>
            </div>
            <div id="messages-list" class="space-y-8 flex flex-col"></div>
        </div>

        <div class="p-4 bg-white">
            <div class="max-w-3xl mx-auto relative">
                <div class="bg-[#f0f4f9] rounded-[28px] p-2 focus-within:bg-white focus-within:shadow-xl border-2 border-transparent focus-within:border-blue-100 transition-all flex flex-col">
                    
                    <div id="imagePreviewContainer" class="hidden px-3 pb-2 pt-1">
                        <div class="relative inline-block">
                            <img id="previewImg" src="" class="h-20 w-20 object-cover rounded-xl border-2 border-white shadow-md">
                            <button onclick="window.removeImage()" class="absolute -top-2 -right-2 bg-gray-800 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs shadow-lg">
                                <i class="fa-solid fa-xmark"></i>
                            </button>
                        </div>
                    </div>

                    <textarea id="userInput" rows="1" class="w-full bg-transparent border-none focus:ring-0 p-3 resize-none text-gray-800 text-lg" placeholder="Хазза язъе..."></textarea>
                    
                    <div class="flex justify-between items-center px-2 pb-1">
                        <div class="flex gap-2">
                            <label class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-200 cursor-pointer text-gray-500 transition">
                                <i class="fa-regular fa-image text-xl"></i>
                                <input type="file" id="imageInput" class="hidden" accept="image/*">
                            </label>
                            <button id="micBtn" onclick="window.startVoice()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-200 text-gray-500 transition">
                                <i class="fa-solid fa-microphone text-xl"></i>
                            </button>
                        </div>
                        <button onclick="window.sendMessage()" id="sendBtn" class="bg-blue-600 text-white w-10 h-10 rounded-full shadow-lg hover:bg-blue-700 transition flex items-center justify-center">
                            <i class="fa-solid fa-arrow-up text-lg"></i>
                        </button>
                    </div>
                </div>
                <p class="text-[10px] text-center text-gray-400 mt-3 uppercase tracking-widest">Ghost AI — Нохчийн школьникашна гIоьнча</p>
            </div>
        </div>
    </main>

    <script>
        const API_KEY = "AIzaSyB3O_Vj1iZ12Z7JHrc1_c2eCZ6NwlJOAGI";

        const userInput = document.getElementById('userInput');
        const messagesList = document.getElementById('messages-list');
        const welcomeView = document.getElementById('welcome-view');
        const imageInput = document.getElementById('imageInput');
        const historyList = document.getElementById('history-list');

        let currentImagePart = null;
        let currentImageSrc = null;

        window.fillInput = (text) => {
            userInput.value = text;
            userInput.focus();
        };

        window.removeImage = () => {
            currentImagePart = null;
            currentImageSrc = null;
            imageInput.value = '';
            document.getElementById('imagePreviewContainer').classList.add('hidden');
        };

        window.startVoice = () => {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("Браузер поддерживает микрофон дац.");
            
            const recognition = new SpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.onstart = () => {
                document.getElementById('micBtn').classList.add('text-red-500', 'animate-pulse');
            };
            recognition.onresult = (e) => userInput.value += e.results[0][0].transcript;
            recognition.onend = () => {
                document.getElementById('micBtn').classList.remove('text-red-500', 'animate-pulse');
            };
            recognition.start();
        };

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                currentImageSrc = ev.target.result;
                currentImagePart = { 
                    inline_data: { 
                        data: currentImageSrc.split(',')[1], 
                        mime_type: file.type 
                    } 
                };
                document.getElementById('previewImg').src = currentImageSrc;
                document.getElementById('imagePreviewContainer').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        });

        window.sendMessage = async () => {
            const text = userInput.value.trim();
            if (!text && !currentImagePart) return;

            welcomeView.classList.add('hidden');
            
            let userHtml = '';
            if (currentImageSrc) userHtml += `<img src="${currentImageSrc}" class="chat-image">`;
            if (text) userHtml += `<div>${text}</div>`;
            appendMessage('user', userHtml);

            const promptText = text || "Суьрта тIехь дерг дийца";
            const histText = text || "Сурт";
            
            const requestParts = [{ text: promptText }];
            if (currentImagePart) requestParts.push(currentImagePart);

            userInput.value = '';
            window.removeImage();

            const aiWrapper = appendMessage('ai', '<span class="loading-dots">Ойла йо</span>');

            try {
                // ИСПОЛЬЗУЕМ СТАБИЛЬНУЮ ВЕРСИЮ v1 ВМЕСТО v1beta
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "System instruction: Ты Ghost AI. Помогаешь чеченским школьникам. Отвечай ТОЛЬКО на чеченском языке. Если не знаешь перевода термина, используй общепринятый, но весь контекст — на чеченском." },
                                ...requestParts
                            ]
                        }]
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error?.message || "API гIалат");
                }

                const responseText = data.candidates[0].content.parts[0].text;
                renderAIResponse(aiWrapper, responseText);
                saveHistory(histText);

            } catch (err) {
                aiWrapper.querySelector('.prose').innerHTML = `<span class="text-red-500 font-medium">ГIалат: ${err.message}</span>`;
            }
        };

        function appendMessage(role, content) {
            const div = document.createElement('div');
            div.className = role === 'user' ? 'flex justify-end' : 'ai-msg-container flex gap-4';
            div.innerHTML = role === 'user' 
                ? `<div class="user-msg shadow-md">${content}</div>`
                : `<div class="ghost-avatar flex-shrink-0 shadow-lg">G</div><div class="flex-1 overflow-hidden"><div class="prose text-gray-800 leading-relaxed break-words">${content}</div></div>`;
            messagesList.appendChild(div);
            const chat = document.getElementById('chat-container');
            chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
            return div;
        }

        function renderAIResponse(wrapper, text) {
            const content = wrapper.querySelector('.prose');
            content.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');
            
            const copyBtn = document.createElement('button');
            copyBtn.className = 'mt-2 text-gray-400 hover:text-blue-600 text-[10px] uppercase transition flex items-center gap-1';
            copyBtn.innerHTML = '<i class="fa-regular fa-copy"></i> Копировать';
            copyBtn.onclick = () => {
                navigator.clipboard.writeText(text);
                copyBtn.innerHTML = '<i class="fa-solid fa-check text-green-500"></i> Схьаэцна!';
                setTimeout(() => copyBtn.innerHTML = '<i class="fa-regular fa-copy"></i> Копировать', 2000);
            };
            content.after(copyBtn);
        }

        function saveHistory(t) {
            let h = JSON.parse(localStorage.getItem('ghost_h') || '[]');
            if(!h.includes(t)) {
                h.unshift(t);
                localStorage.setItem('ghost_h', JSON.stringify(h.slice(0, 10)));
                loadHistory();
            }
        }

        function loadHistory() {
            historyList.innerHTML = '';
            JSON.parse(localStorage.getItem('ghost_h') || '[]').forEach(t => {
                const d = document.createElement('div');
                d.className = 'p-3 text-sm text-gray-600 hover:bg-white hover:shadow-sm rounded-xl cursor-pointer truncate transition';
                d.innerHTML = `• ${t}`;
                d.onclick = () => { userInput.value = t; window.sendMessage(); };
                historyList.appendChild(d);
            });
        }

        userInput.addEventListener('keydown', (e) => { 
            if(e.key === 'Enter' && !e.shiftKey) { 
                e.preventDefault(); 
                window.sendMessage(); 
            } 
        });
        window.onload = loadHistory;
    </script>
</body>
</html>
