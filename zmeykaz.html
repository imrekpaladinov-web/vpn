<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐍 Змейка</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  body {
    background: #0a0a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    touch-action: none;
  }

  #header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: min(92vw, 500px);
    padding: 10px 4px;
    color: #fff;
  }

  #header .score-box {
    background: linear-gradient(135deg, #1a1a3e, #2a2a5e);
    border: 1px solid #444;
    border-radius: 12px;
    padding: 8px 18px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  #header .score-box span {
    color: #4eff91;
  }

  #gameCanvas {
    border: 2px solid #2a2a5e;
    border-radius: 12px;
    background: #0f0f2a;
    box-shadow: 0 0 40px rgba(78, 255, 145, 0.08), inset 0 0 60px rgba(0,0,0,0.5);
  }

  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    backdrop-filter: blur(6px);
  }

  #overlay.hidden {
    display: none;
  }

  #overlay h1 {
    color: #4eff91;
    font-size: 36px;
    margin-bottom: 8px;
    text-shadow: 0 0 20px rgba(78, 255, 145, 0.5);
  }

  #overlay .subtitle {
    color: #aaa;
    font-size: 16px;
    margin-bottom: 6px;
  }

  #overlay .final-score {
    color: #fff;
    font-size: 24px;
    margin: 14px 0 24px;
  }

  #overlay .final-score span {
    color: #4eff91;
    font-weight: 700;
  }

  #playBtn {
    background: linear-gradient(135deg, #4eff91, #2cc972);
    color: #0a0a1a;
    border: none;
    padding: 16px 52px;
    font-size: 22px;
    font-weight: 800;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 1px;
    box-shadow: 0 4px 25px rgba(78, 255, 145, 0.35);
    transition: transform 0.15s, box-shadow 0.15s;
  }

  #playBtn:active {
    transform: scale(0.95);
    box-shadow: 0 2px 15px rgba(78, 255, 145, 0.25);
  }

  #controls {
    display: none;
    grid-template-areas:
      ". up ."
      "left down right";
    grid-template-columns: repeat(3, 70px);
    grid-template-rows: repeat(2, 70px);
    gap: 6px;
    margin-top: 16px;
  }

  @media (hover: none) and (pointer: coarse) {
    #controls {
      display: grid;
    }
  }

  .ctrl-btn {
    background: linear-gradient(145deg, #1a1a3e, #252550);
    border: 1px solid #333;
    border-radius: 14px;
    color: #4eff91;
    font-size: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.1s;
  }

  .ctrl-btn:active {
    background: linear-gradient(145deg, #2a2a5e, #3a3a70);
  }

  .ctrl-btn.up    { grid-area: up; }
  .ctrl-btn.down  { grid-area: down; }
  .ctrl-btn.left  { grid-area: left; }
  .ctrl-btn.right { grid-area: right; }
</style>
</head>
<body>

<div id="header">
  <div class="score-box">🍎 Счёт: <span id="score">0</span></div>
  <div class="score-box">🏆 Рекорд: <span id="best">0</span></div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="controls">
  <button class="ctrl-btn up"    data-dir="up">▲</button>
  <button class="ctrl-btn left"  data-dir="left">◀</button>
  <button class="ctrl-btn down"  data-dir="down">▼</button>
  <button class="ctrl-btn right" data-dir="right">▶</button>
</div>

<div id="overlay">
  <h1 id="overlayTitle">🐍 Змейка</h1>
  <p class="subtitle" id="overlaySubtitle">Свайпай или жми кнопки</p>
  <div class="final-score hidden" id="finalScore">Счёт: <span id="finalNum">0</span></div>
  <button id="playBtn">ИГРАТЬ</button>
</div>

<script>
// ============ НАСТРОЙКИ ============
const GRID      = 20;       // клеток по каждой оси
const BASE_SPEED = 130;     // мс между кадрами (меньше = быстрее)
const SPEED_INC  = 2;       // ускорение за каждое яблоко

// ============ ЭЛЕМЕНТЫ ============
const canvas   = document.getElementById('gameCanvas');
const ctx      = canvas.getContext('2d');
const scoreEl  = document.getElementById('score');
const bestEl   = document.getElementById('best');
const overlay  = document.getElementById('overlay');
const playBtn  = document.getElementById('playBtn');
const finalBox = document.getElementById('finalScore');
const finalNum = document.getElementById('finalNum');
const oTitle   = document.getElementById('overlayTitle');
const oSub     = document.getElementById('overlaySubtitle');

// ============ РАЗМЕР КАНВАСА ============
let cell, W, H;

function resize() {
  const maxW = Math.min(window.innerWidth * 0.92, 500);
  const maxH = window.innerHeight * 0.62;
  cell = Math.floor(Math.min(maxW, maxH) / GRID);
  W = cell * GRID;
  H = cell * GRID;
  canvas.width  = W;
  canvas.height = H;
  draw();
}
window.addEventListener('resize', resize);

// ============ СОСТОЯНИЕ ИГРЫ ============
let snake, dir, nextDir, food, score, best, speed, running, loop;

best = +localStorage.getItem('snakeBest') || 0;
bestEl.textContent = best;

function init() {
  const mid = Math.floor(GRID / 2);
  snake   = [{ x: mid, y: mid }, { x: mid - 1, y: mid }, { x: mid - 2, y: mid }];
  dir     = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score   = 0;
  speed   = BASE_SPEED;
  scoreEl.textContent = 0;
  placeFood();
}

function placeFood() {
  let pos;
  do {
    pos = { x: Math.floor(Math.random() * GRID), y: Math.floor(Math.random() * GRID) };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

// ============ ОТРИСОВКА ============
function draw() {
  // Фон
  ctx.fillStyle = '#0f0f2a';
  ctx.fillRect(0, 0, W, H);

  // Сетка (тонкая)
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= GRID; i++) {
    ctx.beginPath(); ctx.moveTo(i * cell, 0); ctx.lineTo(i * cell, H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i * cell); ctx.lineTo(W, i * cell); ctx.stroke();
  }

  if (!snake) return;

  // Еда (яблоко)
  const fx = food.x * cell, fy = food.y * cell, r = cell * 0.4;
  const pulse = 1 + 0.08 * Math.sin(Date.now() / 200);

  // Свечение еды
  ctx.save();
  ctx.shadowColor = '#ff4444';
  ctx.shadowBlur = 15 * pulse;
  ctx.fillStyle = '#ff3b3b';
  ctx.beginPath();
  ctx.arc(fx + cell / 2, fy + cell / 2, r * pulse, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Хвостик яблока
  ctx.fillStyle = '#3cb371';
  ctx.fillRect(fx + cell / 2 - 1, fy + cell * 0.15, 2, cell * 0.2);

  // Змейка
  snake.forEach((seg, i) => {
    const x = seg.x * cell, y = seg.y * cell;
    const pad = cell * 0.06;
    const radius = cell * 0.18;

    // Градиент от головы к хвосту
    const t = i / snake.length;
    const g = Math.round(255 - t * 120);
    const b = Math.round(145 - t * 80);

    ctx.fillStyle = i === 0 ? '#4eff91' : `rgb(30, ${g}, ${b})`;

    if (i === 0) {
      ctx.save();
      ctx.shadowColor = '#4eff91';
      ctx.shadowBlur = 12;
    }

    roundRect(ctx, x + pad, y + pad, cell - pad * 2, cell - pad * 2, radius);
    ctx.fill();

    if (i === 0) ctx.restore();

    // Глаза на голове
    if (i === 0) {
      ctx.fillStyle = '#0a0a1a';
      const es = cell * 0.1;
      let e1x, e1y, e2x, e2y;
      const cx = x + cell / 2, cy = y + cell / 2;

      if (dir.x === 1)       { e1x = cx + cell*0.15; e1y = cy - cell*0.15; e2x = cx + cell*0.15; e2y = cy + cell*0.15; }
      else if (dir.x === -1) { e1x = cx - cell*0.15; e1y = cy - cell*0.15; e2x = cx - cell*0.15; e2y = cy + cell*0.15; }
      else if (dir.y === -1) { e1x = cx - cell*0.15; e1y = cy - cell*0.15; e2x = cx + cell*0.15; e2y = cy - cell*0.15; }
      else                   { e1x = cx - cell*0.15; e1y = cy + cell*0.15; e2x = cx + cell*0.15; e2y = cy + cell*0.15; }

      ctx.beginPath(); ctx.arc(e1x, e1y, es, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(e2x, e2y, es, 0, Math.PI * 2); ctx.fill();
    }
  });
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ============ ЛОГИКА ============
function step() {
  dir = { ...nextDir };

  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Столкновение со стеной
  if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) {
    return gameOver();
  }

  // Столкновение с собой
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    return gameOver();
  }

  snake.unshift(head);

  // Съели еду?
  if (head.x === food.x && head.y === food.y) {
    score++;
    scoreEl.textContent = score;
    speed = Math.max(55, BASE_SPEED - score * SPEED_INC);
    placeFood();
    restartLoop();
  } else {
    snake.pop();
  }

  draw();
  loop = setTimeout(step, speed);
}

function restartLoop() {
  clearTimeout(loop);
  loop = setTimeout(step, speed);
}

function gameOver() {
  running = false;
  if (score > best) {
    best = score;
    localStorage.setItem('snakeBest', best);
    bestEl.textContent = best;
  }
  oTitle.textContent = '💀 Игра окончена';
  oSub.textContent = score > 0 ? 'Попробуй ещё раз!' : 'Бывает...';
  finalBox.classList.remove('hidden');
  finalNum.textContent = score;
  playBtn.textContent = 'ЗАНОВО';
  overlay.classList.remove('hidden');
}

function startGame() {
  overlay.classList.add('hidden');
  finalBox.classList.add('hidden');
  init();
  draw();
  running = true;
  loop = setTimeout(step, speed);
}

// ============ УПРАВЛЕНИЕ ============

// Свайпы
let touchStartX, touchStartY;

document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', e => {
  if (!running) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const absDx = Math.abs(dx);
  const absDy = Math.abs(dy);

  if (Math.max(absDx, absDy) < 20) return; // слишком короткий свайп

  if (absDx > absDy) {
    if (dx > 0 && dir.x !== -1) nextDir = { x: 1, y: 0 };
    else if (dx < 0 && dir.x !== 1) nextDir = { x: -1, y: 0 };
  } else {
    if (dy > 0 && dir.y !== -1) nextDir = { x: 0, y: 1 };
    else if (dy < 0 && dir.y !== 1) nextDir = { x: 0, y: -1 };
  }
}, { passive: true });

// Кнопки
document.querySelectorAll('.ctrl-btn').forEach(btn => {
  btn.addEventListener('touchstart', e => {
    e.preventDefault();
    if (!running) return;
    const d = btn.dataset.dir;
    if (d === 'up'    && dir.y !== 1)  nextDir = { x: 0, y: -1 };
    if (d === 'down'  && dir.y !== -1) nextDir = { x: 0, y: 1 };
    if (d === 'left'  && dir.x !== 1)  nextDir = { x: -1, y: 0 };
    if (d === 'right' && dir.x !== -1) nextDir = { x: 1, y: 0 };
  });
});

// Клавиатура (для ПК)
document.addEventListener('keydown', e => {
  if (!running) return;
  if (e.key === 'ArrowUp'    && dir.y !== 1)  nextDir = { x: 0, y: -1 };
  if (e.key === 'ArrowDown'  && dir.y !== -1) nextDir = { x: 0, y: 1 };
  if (e.key === 'ArrowLeft'  && dir.x !== 1)  nextDir = { x: -1, y: 0 };
  if (e.key === 'ArrowRight' && dir.x !== -1) nextDir = { x: 1, y: 0 };
});

// Кнопка старта
playBtn.addEventListener('click', startGame);

// Предотвращаем скролл на странице
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

// Первый запуск — размер
resize();
init();
draw();
</script>
</body>
  </html>
