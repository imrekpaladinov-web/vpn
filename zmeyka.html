<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Змейка</title>
    <style>
        body {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; background: #1a1a2e;
            font-family: 'Segoe UI', sans-serif; flex-direction: column;
        }
        canvas { border: 3px solid #0f3460; background: #16213e; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .ui { color: #e94560; font-size: 24px; margin-bottom: 15px; font-weight: bold; }
        .hint { color: #888; margin-top: 12px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="ui">Счёт: <span id="score">0</span></div>
    <canvas id="game" width="400" height="400"></canvas>
    <div class="hint">Управление: стрелки на клавиатуре ⬆️⬇️⬅️➡️</div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        const GRID = 20;
        const TILES = canvas.width / GRID;

        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let dx = 0, dy = 0, score = 0;
        let running = false;

        function loop() {
            if (!running) return;
            clear();
            move();
            if (hit()) {
                running = false;
                alert('💀 Игра окончена! Твой счёт: ' + score);
                reset();
                return;
            }
            draw();
            setTimeout(loop, 100);
        }

        function clear() {
            ctx.fillStyle = '#16213e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function draw() {
            // Еда
            ctx.fillStyle = '#e94560';
            ctx.fillRect(food.x * GRID, food.y * GRID, GRID - 2, GRID - 2);

            // Змейка
            ctx.fillStyle = '#00d2ff';
            snake.forEach(p => ctx.fillRect(p.x * GRID, p.y * GRID, GRID - 2, GRID - 2));
        }

        function move() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score++;
                scoreEl.textContent = score;
                spawnFood();
            } else {
                snake.pop();
            }
        }

        function spawnFood() {
            food.x = Math.floor(Math.random() * TILES);
            food.y = Math.floor(Math.random() * TILES);
            for (let p of snake) {
                if (p.x === food.x && p.y === food.y) { spawnFood(); return; }
            }
        }

        function hit() {
            const h = snake[0];
            if (h.x < 0 || h.x >= TILES || h.y < 0 || h.y >= TILES) return true;
            for (let i = 1; i < snake.length; i++) {
                if (h.x === snake[i].x && h.y === snake[i].y) return true;
            }
            return false;
        }

        function reset() {
            snake = [{x: 10, y: 10}];
            food = {x: 15, y: 15};
