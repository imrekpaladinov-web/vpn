<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN Premium Access</title>
    <style>
        :root {
            --bg-color: #050a05;
            --main-glow: #00ff41;
            --button-bg: #0a1a0a;
            --button-hover: #0f2d0f;
            --text-color: #e0ffe0;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 50% 50%, #0a200a 0%, #050a05 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-color);
        }

        .container {
            text-align: center;
            padding: 40px;
            background: rgba(10, 26, 10, 0.8);
            border: 1px solid rgba(0, 255, 65, 0.2);
            border-radius: 24px;
            box-shadow: 0 0 50px rgba(0, 255, 65, 0.1);
            max-width: 400px;
            width: 90%;
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 40px;
            color: var(--main-glow);
            text-transform: uppercase;
            letter-spacing: 5px;
            /* Эффект свечения заголовка */
            text-shadow: 
                0 0 10px rgba(0, 255, 65, 0.8),
                0 0 20px rgba(0, 255, 65, 0.5),
                0 0 30px rgba(0, 255, 65, 0.3);
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.8; text-shadow: 0 0 10px var(--main-glow); }
            to { opacity: 1; text-shadow: 0 0 25px var(--main-glow), 0 0 40px #008000; }
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn {
            text-decoration: none;
            color: var(--main-glow);
            background: var(--button-bg);
            padding: 18px 25px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 255, 65, 0.3);
            box-shadow: inset 0 0 15px rgba(0, 255, 65, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover {
            background: var(--button-hover);
            transform: translateY(-3px);
            border-color: var(--main-glow);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4), 0 0 15px rgba(0, 255, 65, 0.2);
            color: #ffffff;
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-tech {
            margin-top: 10px;
            border-color: rgba(0, 255, 65, 0.1);
            font-size: 0.95rem;
            opacity: 0.9;
        }

        /* Декоративный элемент */
        .glow-sphere {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 255, 65, 0.05) 0%, transparent 70%);
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="glow-sphere"></div>

    <div class="container">
        <h1>GENERAL VPN</h1>
        
        <div class="btn-group">
            <a href="https://vpnone.ru/connect/?url=v2raytun%3A%2F%2Fimport%2Fhttps://raw.githubusercontent.com/imrekpaladinov-web/vpn/refs/heads/main/GeneralVPN.txt" class="btn">
                Импорт в V2RayTun
            </a>

            <a href="https://vpnone.ru/connect/?url=happ%3A%2F%2Fadd%2Fhttps://raw.githubusercontent.com/imrekpaladinov-web/vpn/refs/heads/main/GeneralVPN.txt" class="btn">
                Импорт в Happ
            </a>

            <a href="https://t.me/svumt" class="btn btn-tech">
                🗒️ Тех.поддержка
            </a>
        </div>
    </div>

</body>
</html>
