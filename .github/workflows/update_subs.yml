name: Global Subscription Update

on:
  push:
    paths:
      - 'access_control.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-all-subs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Update all sub files
        run: |
          mkdir -p database/subs
          python3 <<EOF
          import json, os, time

          # Загружаем конфиг серверов
          with open('access_control.json', 'r', encoding='utf-8') as f:
              data = json.load(f)
              raw_links = [l.split('#')[0].strip() for l in data.get('server_list', []) if l.strip()]

          names = ['🇪🇺 Основной ⚡', '🇪🇺 Резерв ⚡', '🇪🇺 Запасной ⚡', '🇪🇺 YouTube ⚡', '🇪🇺 Соц.сети ⚡']
          
          # 10 ТБ и 10 лет в секундах
          total_bytes = 10 * 1024 * 1024 * 1024 * 1024
          expire_date = int(time.time()) + (10 * 365 * 24 * 3600)

          subs_dir = 'database/subs'
          if os.path.exists(subs_dir):
              for filename in os.listdir(subs_dir):
                  if filename.startswith('sub_') and filename.endswith('.txt'):
                      # Вытаскиваем реальный ID пользователя из имени файла
                      user_id = filename.replace('sub_', '').replace('.txt', '')
                      
                      # ФОРМИРУЕМ СТРУКТУРУ ЧИСТЫМ ТЕКСТОМ
                      header = [
                          f"#profile-title: Ghost Link | ID: {user_id}",
                          f"#announce: Подписка активна ✅ Пользователь: {user_id}",
                          f"#subscription-userinfo: upload=0; download=0; total={total_bytes}; expire={expire_date}",
                          "" # Обязательная пустая строка перед ссылками
                      ]
                      
                      # Собираем список серверов
                      server_lines = []
                      for i, link in enumerate(raw_links):
                          name = names[i] if i < len(names) else f'🇪🇺 Доп. сервер {i+1} ⚡'
                          server_lines.append(f"{link}#{name}")
                      
                      # Склеиваем всё в один RAW текст
                      full_content = "\n".join(header + server_lines)
                      
                      # Записываем файл (без Base64)
                      with open(os.path.join(subs_dir, filename), 'w', encoding='utf-8') as out:
                          out.write(full_content)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "GhostBot"
          git config --global user.email "bot@ghostlink.vpn"
          git add database/subs/*.txt
          git commit -m "🤖 RAW format update: Title, Announce, UserInfo" || echo "No changes"
          git push
          
