name: Global Subscription Update

on:
  push:
    paths:
      - 'access_control.json'
  workflow_dispatch:

jobs:
  update-all-subs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Update all sub files
        run: |
          if [ -d "database/subs" ]; then
            for file in database/subs/sub_*.txt; do
              if [ -f "$file" ]; then
                USER_ID=$(basename "$file" .txt | sed 's/sub_//')
                
                # Используем Python для строгой разметки названий
                SERVERS=$(python3 -c "
import json
with open('access_control.json', 'r') as f:
    data = json.load(f)
    uid = '$USER_ID'
    links = [s.split('#')[0].strip() for s in data['server_list'] if s]
    
    # Твой список названий
    names = [
        '🇪🇺 Основной | ID: {id} ⚡',
        '🇪🇺 Резерв | ID: {id} ⚡',
        '🇪🇺 Запасной | ID: {id} ⚡',
        '🇪🇺 YouTube | ID: {id} ⚡',
        '🇪🇺 Instagram, TikTok | ID: {id} ⚡'
    ]
    
    final_list = []
    for i, link in enumerate(links):
        # Если ссылок больше, чем названий в списке, используем дефолтное
        name_template = names[i] if i < len(names) else '🇪🇺 Доп. сервер | ID: {id} ⚡'
        full_name = name_template.replace('{id}', uid)
        final_list.append(f'{link}#{full_name}')
        
    print('\n'.join(final_list))
")
                
                echo "$SERVERS" | base64 -w 0 > "$file"
                echo "✅ $file обновлен с красивыми названиями для $USER_ID"
              fi
            done
          fi

      - name: Commit and Push changes
        run: |
          git config --global user.name "GhostBot"
          git config --global user.email "bot@ghostlink.vpn"
          git add database/subs/*.txt
          git commit -m "🤖 Названия серверов приведены к единому стандарту Ghost Link" || echo "No changes"
          git push
          
