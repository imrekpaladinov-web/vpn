name: Global Subscription Update

on:
  push:
    paths:
      - 'access_control.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-all-subs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Update all sub files
        run: |
          mkdir -p database/subs
          python3 <<EOF
          import json, os

          with open('access_control.json', 'r') as f:
              data = json.load(f)
              links = [s.split('#')[0].strip() for s in data['server_list'] if s]

          names = [
              '🇪🇺 Основной | ID: {id} ⚡',
              '🇪🇺 Резерв | ID: {id} ⚡',
              '🇪🇺 Запасной | ID: {id} ⚡',
              '🇪🇺 YouTube | ID: {id} ⚡',
              '🇪🇺 Соц.сети | ID: {id} ⚡'
          ]

          subs_dir = 'database/subs'
          if os.path.exists(subs_dir):
              for filename in os.listdir(subs_dir):
                  if filename.startswith('sub_') and filename.endswith('.txt'):
                      user_id = filename.replace('sub_', '').replace('.txt', '')
                      
                      final_lines = []
                      # Первая строка - заглушка с твоим текстом (это 100% валидный vless)
                      ann_text = f"Все сервера работают в штатном режиме ✅ | ID: {user_id} ⚡️"
                      final_lines.append(f"vless://00000000-0000-0000-0000-000000000000@0.0.0.0:0?type=tcp&security=none#{ann_text}")
                      
                      # Остальные сервера
                      for i, link in enumerate(links):
                          name_template = names[i] if i < len(names) else '🇪🇺 Доп. сервер | ID: {id} ⚡'
                          final_lines.append(f"{link}#{name_template.replace('{id}', user_id)}")
                      
                      # Сохраняем как ЧИСТЫЙ ТЕКСТ (без Base64)
                      with open(os.path.join(subs_dir, filename), 'w') as out:
                          out.write("\n".join(final_lines))
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "GhostBot"
          git config --global user.email "bot@ghostlink.vpn"
          git add database/subs/*.txt
          git commit -m "🤖 Чистый текст без кодировок" || echo "No changes"
          git push
          
