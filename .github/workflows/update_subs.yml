name: Global Subscription Update

on:
  push:
    paths:
      - 'access_control.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-all-subs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Update all sub files
        run: |
          mkdir -p database/subs
          python3 <<EOF
          import json, base64, os, time

          with open('access_control.json', 'r', encoding='utf-8') as f:
              data = json.load(f)
              raw_links = [l.split('#')[0].strip() for l in data.get('server_list', []) if l.strip()]

          names = ['🇪🇺 Основной ⚡', '🇪🇺 Резерв ⚡', '🇪🇺 Запасной ⚡', '🇪🇺 YouTube ⚡', '🇪🇺 Соц.сети ⚡']
          
          # 10 ТБ и 10 лет
          total_bytes = 10 * 1024 * 1024 * 1024 * 1024
          expire_date = int(time.time()) + (10 * 365 * 24 * 3600)

          subs_dir = 'database/subs'
          if os.path.exists(subs_dir):
              for filename in os.listdir(subs_dir):
                  if filename.startswith('sub_') and filename.endswith('.txt'):
                      # Извлекаем ID (например, GL-1234)
                      user_id = filename.replace('sub_', '').replace('.txt', '')
                      
                      # 1. Формируем ШАПКУ с ID
                      header = [
                          f"#profile-title: Ghost Link | {user_id}",
                          f"#announce: Ghost Link Premium ✅ | Ваш ID: {user_id} | Лимит: 10 ТБ",
                          f"#subscription-userinfo: upload=0; download=0; total={total_bytes}; expire={expire_date}",
                          "" 
                      ]
                      
                      # 2. Формируем СЕРВЕРА с ID в названии
                      server_lines = []
                      for i, link in enumerate(raw_links):
                          name_base = names[i] if i < len(names) else '🇪🇺 Доп. сервер ⚡'
                          # Добавляем ID прямо в название каждого сервера
                          server_lines.append(f"{link}#{name_base} [{user_id}]")
                      
                      # Склеиваем всё
                      full_content = "\n".join(header + server_lines)
                      
                      # 3. Кодируем в Base64
                      # Happ понимает RAW, но v2raytun чаще требует Base64 для тегов #profile-title
                      encoded = base64.b64encode(full_content.encode('utf-8')).decode('utf-8')
                      
                      with open(os.path.join(subs_dir, filename), 'w', encoding='utf-8') as out:
                          out.write(encoded)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "GhostBot"
          git config --global user.email "bot@ghostlink.vpn"
          git add database/subs/*.txt
          git commit -m "🤖 Full Update: ID in Title, Announce, and Servers" || echo "No changes"
          git push
          
