name: Global Subscription Update

on:
  push:
    paths:
      - 'access_control.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-all-subs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Update all sub files
        run: |
          mkdir -p database/subs
          python3 <<EOF
          import json, base64, os

          with open('access_control.json', 'r', encoding='utf-8') as f:
              data = json.load(f)
              raw_links = [l.split('#')[0].strip() for l in data.get('server_list', []) if l.strip()]

          names = ['🇪🇺 Основной ⚡', '🇪🇺 Резерв ⚡', '🇪🇺 Запасной ⚡', '🇪🇺 YouTube ⚡', '🇪🇺 Соц.сети ⚡']

          subs_dir = 'database/subs'
          if os.path.exists(subs_dir):
              for filename in os.listdir(subs_dir):
                  if filename.startswith('sub_') and filename.endswith('.txt'):
                      user_id = filename.replace('sub_', '').replace('.txt', '')
                      
                      # 1. ФОРМИРУЕМ ШАПКУ ОПИСАНИЯ
                      # Это то, что будет висеть в самом верху над серверами
                      header = [
                          f"REMARKS: Ghost Link Premium 👻",
                          f"STATUS: Активен ✅ | ID: {user_id}",
                          f"STATUS: Лимит: Безлимитный ♾",
                          f"STATUS: Истекает: 01.01.2027",
                          f"⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯"
                      ]
                      
                      # 2. ДОБАВЛЯЕМ СЕРВЕРА С НАЗВАНИЯМИ
                      server_lines = []
                      for i, link in enumerate(raw_links):
                          name = names[i] if i < len(names) else '🇪🇺 Доп. сервер ⚡'
                          server_lines.append(f"{link}#{name}")
                      
                      # Склеиваем всё в один текстовый блок
                      full_content = "\n".join(header + server_lines)
                      
                      # 3. КОДИРУЕМ В BASE64
                      # Без этого заголовки STATUS/REMARKS превратят подписку в "невалидную"
                      encoded = base64.b64encode(full_content.encode('utf-8')).decode('utf-8')
                      
                      with open(os.path.join(subs_dir, filename), 'w', encoding='utf-8') as out:
                          out.write(encoded)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "GhostBot"
          git config --global user.email "bot@ghostlink.vpn"
          git add database/subs/*.txt
          git commit -m "🤖 Возврат описания (REMARKS/STATUS)" || echo "No changes"
          git push
          
