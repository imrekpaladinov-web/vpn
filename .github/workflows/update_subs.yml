name: Global Subscription Update

on:
  push:
    paths:
      - 'access_control.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-all-subs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Update all sub files
        run: |
          mkdir -p database/subs
          
          python3 <<EOF
          import json, base64, os

          # 1. Читаем конфиги из access_control.json
          with open('access_control.json', 'r') as f:
              data = json.load(f)
              links = [s.split('#')[0].strip() for s in data['server_list'] if s]

          names = [
              '🇪🇺 Основной | ID: {id} ⚡',
              '🇪🇺 Резерв | ID: {id} ⚡',
              '🇪🇺 Запасной | ID: {id} ⚡',
              '🇪🇺 YouTube | ID: {id} ⚡',
              '🇪🇺 Соц.сети | ID: {id} ⚡'
          ]

          # 2. Обходим все файлы подписок
          subs_dir = 'database/subs'
          if os.path.exists(subs_dir):
              for filename in os.listdir(subs_dir):
                  if filename.startswith('sub_') and filename.endswith('.txt'):
                      user_id = filename.replace('sub_', '').replace('.txt', '')
                      
                      server_lines = []
                      for i, link in enumerate(links):
                          name_template = names[i] if i < len(names) else '🇪🇺 Доп. сервер | ID: {id} ⚡'
                          server_lines.append(f"{link}#{name_template.replace('{id}', user_id)}")
                      
                      # Формируем контент (Текст + Статус + Ссылки)
                      announce = f"#announce Все сервера работают в штатном режиме ✅ | ID: {user_id} ⚡️"
                      status = "STATUS: upload=0; download=0; total=1073741824000; expire=1893456000"
                      
                      full_content = f"{announce}\n{status}\n" + "\n".join(server_lines)
                      
                      # КОДИРУЕМ ВСЁ ВМЕСТЕ В BASE64 (это делает подписку валидной)
                      encoded_content = base64.b64encode(full_content.encode('utf-8')).decode('utf-8')
                      
                      with open(os.path.join(subs_dir, filename), 'w') as out:
                          out.write(encoded_content)
                      print(f"✅ Подписка {user_id} обновлена")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "GhostBot"
          git config --global user.email "bot@ghostlink.vpn"
          git add database/subs/*.txt
          git commit -m "🤖 Fix: Валидная подписка (Base64 Full)" || echo "No changes"
          git push
          
