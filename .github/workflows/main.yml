name: Update Subscriptions

on:
  workflow_dispatch: # Позволяет запускать вручную
  push:
    paths:
      - 'database/users/**' # Запускает, когда в базе новый юзер

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # РАЗРЕШАЕМ ЗАПИСЬ ФАЙЛОВ
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: pubs-actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Robot
        run: python ping_check.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "Auto-update: New personal subscriptions" || exit 0
          git push
          
