name: Ghost Sub Robot
on:
  push:
    paths:
      - 'tasks/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Даем права на запись прямо в коде
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Обновил версию для стабильности

      - name: Generate Sub for Client
        run: |
          # Создаем папки, если их нет
          mkdir -p database/subs
          mkdir -p tasks
          
          # Проверяем, есть ли файлы в tasks
          if [ -z "$(ls -A tasks/*.txt 2>/dev/null)" ]; then
            echo "Нет новых задач. Выходим."
            exit 0
          fi

          for file in tasks/*.txt; do
            filename=$(basename "$file" .txt)
            
            # Если в имени файла нет дефиса, пропускаем
            if [[ "$filename" != *-* ]]; then continue; fi
            
            USER_ID=$(echo $filename | cut -d'-' -f1)
            USER_PASS=$(echo $filename | cut -d'-' -f2)
            
            echo "Обработка ID: $USER_ID"
            
            # Проверяем наличие шаблона. Если путь неверный, робот выдаст ошибку здесь.
            TEMPLATE_PATH="cuivu/readmeg/rutyia/readme/muso/vip.txt"
            
            if [ -f "$TEMPLATE_PATH" ]; then
              sed "s/{{ID}}/$USER_ID/g" "$TEMPLATE_PATH" > database/subs/GH-$USER_ID.txt
            else
              echo "ОШИБКА: Файл шаблона по адресу $TEMPLATE_PATH не найден!"
              exit 1
            fi
            
            # Добавляем пароль в vip.html
            if [ -f "vip.html" ]; then
              sed -i "/const db = {/a \            \"$USER_PASS\": \"$USER_ID\"," vip.html
            fi
            
            rm "$file"
          done

      - name: Save changes
        run: |
          git config --global user.name "Ghost-Robot"
          git config --global user.email "robot@ghostlink.vpn"
          git add .
          git commit -m "Робот: Создана подписка" || exit 0
          git push
          
