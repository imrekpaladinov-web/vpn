<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Link | Личный кабинет</title>
    <style>
        :root { --bg: #0a0a0a; --card: #141414; --accent: #ffffff; --red: #ff4d4d; --green: #2ecc71; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .card { background: var(--card); padding: 40px 30px; border-radius: 24px; border: 1px solid #222; width: 320px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8); position: relative; z-index: 1; }
        .card::before { content: ""; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px; background: linear-gradient(45deg, #222, #444, #222); border-radius: 26px; z-index: -1; }
        h1 { color: #888; font-size: 14px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 30px; }
        .status { font-size: 12px; font-weight: 800; padding: 6px 16px; border-radius: 50px; display: inline-block; margin-bottom: 25px; letter-spacing: 1px; }
        .active { background: rgba(46, 204, 113, 0.1); color: var(--green); border: 1px solid var(--green); }
        .expired { background: rgba(255, 77, 77, 0.1); color: var(--red); border: 1px solid var(--red); }
        .info-label { font-size: 12px; color: #555; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        .date { font-size: 24px; font-weight: 300; color: #fff; margin-bottom: 35px; }
        .btn { background: var(--accent); color: #000; padding: 16px; border-radius: 14px; text-decoration: none; display: block; font-weight: 700; transition: all 0.3s ease; cursor: pointer; border: none; width: 100%; font-size: 14px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,255,255,0.2); }
        .footer { margin-top: 30px; font-size: 11px; color: #333; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="card" id="app">
        <h1>GHOST LINK <span id="user-id" style="color: #fff;">...</span></h1>
        <div id="status-box" class="status">ПРОВЕРКА...</div>
        <div class="info-label">Доступ активен до</div>
        <div id="expire-date" class="date">--.--.----</div>
        <button class="btn" onclick="copyLink()">СКОПИРОВАТЬ ПОДПИСКУ</button>
        <div class="footer">ID пользователя защищен<br>© GHOST LINK NETWORK 2026</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');
        
        // Твои данные уже вписаны!
        const GITHUB_USER = "imrekpaladinov-web";
        const GITHUB_REPO = "vpn";

        if (!userId) {
            document.getElementById('app').innerHTML = "<h1>ОШИБКА<br><small>ID не указан</small></h1>";
        } else {
            document.getElementById('user-id').innerText = userId;
            const jsonUrl = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/database/users/${userId}.json`;
            
            fetch(jsonUrl)
                .then(r => {
                    if (!r.ok) throw new Error();
                    return r.json();
                })
                .then(data => {
                    const statusBox = document.getElementById('status-box');
                    if (data.active === true) {
                        statusBox.innerText = "ДОСТУП РАЗРЕШЕН";
                        statusBox.classList.add('active');
                    } else {
                        statusBox.innerText = "ДОСТУП ЗАБЛОКИРОВАН";
                        statusBox.classList.add('expired');
                        document.getElementById('expire-date').style.color = "#ff4d4d";
                    }
                    document.getElementById('expire-date').innerText = data.expire_date;
                })
                .catch(e => {
                    document.getElementById('app').innerHTML = "<h1>ОШИБКА<br><small>Пользователь #" + userId + " не найден</small></h1>";
                });
        }

        function copyLink() {
            const link = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/database/subs/sub_GL-${userId}.txt`;
            navigator.clipboard.writeText(link).then(() => {
                const btn = document.querySelector('.btn');
                const oldText = btn.innerText;
                btn.innerText = "ГОТОВО!";
                btn.style.background = "#2ecc71";
                setTimeout(() => {
                    btn.innerText = oldText;
                    btn.style.background = "#fff";
                }, 2000);
            });
        }
    </script>
</body>
</html>
