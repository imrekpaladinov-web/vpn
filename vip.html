<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Link | VIP Cabinet ⚡</title>
    <style>
        :root {
            --primary-yellow: #ffcc00;
            --dark-bg: #0a0a0a;
            --card-bg: #121212;
            --text-white: #ffffff;
            --shadow-glow: 0 0 20px rgba(255, 204, 0, 0.5);
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-white);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 400px;
            padding: 40px 30px;
            background: var(--card-bg);
            border-radius: 25px;
            border: 1px solid rgba(255, 204, 0, 0.15);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            text-align: center;
        }

        h1 {
            color: var(--primary-yellow);
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 30px;
            text-shadow: var(--shadow-glow);
        }

        /* Поле ввода */
        .input-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 15px;
            background: #000;
            border: 2px solid #222;
            border-radius: 12px;
            color: var(--primary-yellow);
            font-size: 1rem;
            text-align: center;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary-yellow);
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.1);
        }

        .enter-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary-yellow);
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }

        .enter-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        /* Контент после входа */
        #vip-content {
            display: none; /* Скрыто по умолчанию */
        }

        .thanks-msg {
            font-size: 1.3rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 25px;
            animation: fadeIn 1s ease forwards;
            text-shadow: 0 0 15px var(--primary-yellow);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .sub-btn {
            padding: 16px;
            border: 2px solid var(--primary-yellow);
            color: var(--primary-yellow);
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            transition: 0.3s;
        }

        .sub-btn:hover {
            background: var(--primary-yellow);
            color: #000;
        }

        .error {
            color: #ff4444;
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="auth-section">
            <h1>Ghost Link | VIP ⚡</h1>
            <div class="input-group">
                <input type="text" id="pass-field" placeholder="Введите ваш пароль">
                <div id="err-text" class="error">Неверный пароль или доступ истек</div>
            </div>
            <button class="enter-btn" onclick="login()">Войти в кабинет</button>
        </div>

        <div id="vip-content">
            <div class="thanks-msg">Спасибо за покупку! 🎉</div>
            <div class="btn-group">
                <a href="#" id="v2ray-link" class="sub-btn">Импорт для V2rayTun</a>
                <a href="#" id="happ-link" class="sub-btn">Импорт для Happ</a>
            </div>
        </div>
    </div>

    <script>
        // БАЗА ДАННЫХ ПАРОЛЕЙ И ID
        // Формат: "ПАРОЛЬ": "ПЯТИЗНАЧНЫЙ_ID"
        const db = {
            "GHOST-777": "55432",
            "USER-888": "10293",
            "VIP-TEST": "00001"
        };

        function login() {
            const pass = document.getElementById('pass-field').value.trim();
            const err = document.getElementById('err-text');
            const auth = document.getElementById('auth-section');
            const content = document.getElementById('vip-content');

            if (db[pass]) {
                const userId = db[pass];
                setupLinks(userId);
                
                auth.style.display = 'none';
                content.style.display = 'block';
            } else {
                err.style.display = 'block';
            }
        }

        function setupLinks(id) {
            // Ссылка на личный файл пользователя в твоем репозитории
            const fileUrl = `https://raw.githubusercontent.com/imrekpaladinov-web/vpn/main/database/subs/GH-${id}.txt`;
            
            // Настройка кнопок
            document.getElementById('v2ray-link').href = `https://vpnone.ru/connect/?url=v2raytun%3A%2F%2Fimport%2F${encodeURIComponent(fileUrl)}`;
            document.getElementById('happ-link').href = `https://vpnone.ru/connect/?url=happ%3A%2F%2Fadd%2F${encodeURIComponent(fileUrl)}`;
        }
    </script>
</body>
</html>
