<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Headshot Admin</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --accent: #f85149; --green: #2ea44f; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; padding-bottom: 20px; margin-bottom: 20px; }
        .user-card { background: var(--card); border: 1px solid #30363d; border-radius: 8px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .user-card:hover { border-color: #8b949e; }
        .user-id { font-size: 1.1em; font-weight: bold; color: white; display: flex; align-items: center; gap: 10px; }
        .status-badge { padding: 2px 8px; border-radius: 12px; font-size: 0.75em; font-weight: bold; }
        .status-active { background: rgba(46, 164, 79, 0.2); color: #7ee787; border: 1px solid #2ea44f; }
        .status-frozen { background: rgba(248, 81, 73, 0.2); color: #ffa198; border: 1px solid #f85149; }
        .info { font-size: 0.85em; color: #8b949e; margin-top: 4px; }
        button { background: #21262d; border: 1px solid #30363d; color: white; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #30363d; }
        .btn-kill { color: var(--accent); border-color: var(--accent); }
        .btn-kill:hover { background: var(--accent); color: white; }
        #qr-modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background: white; padding: 20px; border-radius: 10px; text-align: center; color: black; z-index: 100; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:99; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>💀 GHOST HEADSHOT</h1>
        <button onclick="loadUsers()">🔄 Обновить</button>
    </div>
    <div id="users-list">
        <div style="text-align:center; padding: 50px;">Загрузка базы данных...</div>
    </div>
</div>

<div class="overlay" onclick="closeQR()"></div>
<div id="qr-modal">
    <div id="qr-code"></div>
    <p id="qr-text" style="margin-top:10px; font-family: monospace;"></p>
    <button onclick="closeQR()" style="background:#000; width:100%;">ЗАКРЫТЬ</button>
</div>

<script>
    // Твои проверенные данные
    const p1 = "Z2hwX2xVSFhlb0pTUWN"; 
    const p2 = "zcm9iYU5GWnhvQzZPTlg3VFlKeDNRUDZxaA=="; 
    const T = atob(p1 + p2);
    const R = "imrekpaladinov-web/vpn"; 

    async function ghRequest(path, method = 'GET', body = null) {
        const url = `https://api.github.com/repos/${R}/contents/${path}`;
        const headers = { 'Authorization': `token ${T}`, 'Accept': 'application/vnd.github.v3+json' };
        const config = { method, headers };
        if (body) config.body = JSON.stringify(body);
        const res = await fetch(url, config);
        return res.json();
    }

    async function loadUsers() {
        const list = document.getElementById('users-list');
        const files = await ghRequest('database/users');
        if (!Array.isArray(files)) {
            list.innerHTML = "<div style='color:red;'>Ошибка доступа! Проверь репозиторий.</div>";
            return;
        }
        
        list.innerHTML = "";
        for (let file of files) {
            if (file.name.endsWith('.json')) {
                const content = await fetch(file.download_url + '?t=' + Date.now()).then(r => r.json());
                const userId = file.name.replace('.json', '');
                renderUser(userId, content, file.sha);
            }
        }
    }

    function renderUser(id, data, sha) {
        const list = document.getElementById('users-list');
        const card = document.createElement('div');
        card.className = 'user-card';
        const sClass = data.active ? 'status-active' : 'status-frozen';
        const sText = data.active ? 'ACTIVE' : 'FROZEN';

        card.innerHTML = `
            <div>
                <div class="user-id">${id} <span class="status-badge ${sClass}">${sText}</span></div>
                <div class="info">📅 Истекает: ${data.expire_date}</div>
            </div>
            <div style="display:flex; gap:8px;">
                <button onclick="showQR('${id}')">📱</button>
                <button onclick="toggleStatus('${id}', ${data.active}, '${sha}', '${data.expire_date}')">${data.active ? '⏸' : '▶️'}</button>
                <button onclick="deleteUser('${id}', '${sha}')" class="btn-kill">🎯</button>
            </div>
        `;
        list.appendChild(card);
    }

    async function toggleStatus(id, current, sha, expire) {
        const newStatus = !current;
        const content = btoa(JSON.stringify({ 
            active: newStatus, 
            expire_date: expire,
            status_text: newStatus ? "" : `🟥 Подписка заморожена | ID: ${id}`
        }, null, 2));

        await ghRequest(`database/users/${id}.json`, 'PUT', {
            message: `Admin: ${newStatus ? 'Activate' : 'Freeze'} ${id}`,
            content: content, sha: sha
        });
        setTimeout(loadUsers, 1500);
    }

    async function deleteUser(id, sha) {
        if (!confirm(`Headshot по ${id}?`)) return;
        await ghRequest(`database/users/${id}.json`, 'DELETE', {
            message: `Admin: Delete ${id}`, sha: sha
        });
        setTimeout(loadUsers, 1500);
    }

    function showQR(id) {
        const subLink = `v2raytun://import/https://${window.location.hostname}/database/subs/sub_${id}.txt`;
        const qrBox = document.getElementById('qr-code');
        qrBox.innerHTML = "";
        const qr = qrcode(0, 'M');
        qr.addData(subLink);
        qr.make();
        qrBox.innerHTML = qr.createImgTag(6);
        document.getElementById('qr-text').innerText = "ID: " + id;
        document.querySelector('.overlay').style.display = 'block';
        document.getElementById('qr-modal').style.display = 'block';
    }

    function closeQR() {
        document.querySelector('.overlay').style.display = 'none';
        document.getElementById('qr-modal').style.display = 'none';
    }

    window.onload = loadUsers;
</script>
</body>
</html>
