<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Admin | Full Fix</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --accent: #f85149; --green: #2ea44f; --gray: #30363d; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--gray); padding-bottom: 15px; margin-bottom: 15px; }
        .user-card { background: var(--card); border: 1px solid var(--gray); border-radius: 10px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .user-id { font-size: 1.1em; font-weight: bold; color: white; }
        button { background: #21262d; border: 1px solid var(--gray); color: white; padding: 10px; border-radius: 6px; cursor: pointer; }
        .status-badge { padding: 3px 8px; border-radius: 6px; font-size: 0.8em; font-weight: bold; border: 1px solid; }
        .active { color: #7ee787; border-color: var(--green); }
        .frozen { color: #ffa198; border-color: var(--accent); }
        #qr-modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background: white; padding: 20px; border-radius: 12px; text-align: center; color: black; z-index: 1000; }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index: 999; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="color:white; margin:0;">💀 HEADSHOT</h1>
        <button onclick="loadUsers()" style="background: var(--green);">🔄 ОБНОВИТЬ</button>
    </div>
    <div id="users-list" style="text-align:center; padding-top:20px;">ОЖИДАНИЕ...</div>
</div>

<div class="overlay" onclick="closeQR()"></div>
<div id="qr-modal">
    <div id="qr-code"></div>
    <p id="qr-text" style="margin-top:10px; font-family: monospace; font-size: 1.2em;"></p>
    <button onclick="closeQR()" style="background:#000; width:100%; color:white; border:none; padding:10px; border-radius:5px;">ЗАКРЫТЬ</button>
</div>

<script>
    // Прямая склейка токена (без atob)
    const p1 = "ghp_lUHXeoJSQc";
    const p2 = "zrobaNFXxoC6ONX7TYJx3QP6qh";
    const REPO = "imrekpaladinov-web/vpn";

    function getT() { return p1 + p2; }

    async function loadUsers() {
        const list = document.getElementById('users-list');
        list.innerHTML = "📡 ПОДКЛЮЧЕНИЕ К БАЗЕ...";
        
        try {
            const response = await fetch(`https://api.github.com/repos/${REPO}/contents/database/users?t=${Date.now()}`, {
                headers: { 'Authorization': `token ${getT()}`, 'Accept': 'application/vnd.github.v3+json' }
            });

            if (!response.ok) {
                list.innerHTML = `<div style="color:red;">ОШИБКА: ${response.status}<br>Проверь папку database/users</div>`;
                return;
            }

            const files = await response.json();
            list.innerHTML = "";

            for (let file of files.reverse()) {
                if (file.name.endsWith('.json')) {
                    const userRes = await fetch(file.download_url + '?t=' + Date.now());
                    const userData = await userRes.json();
                    const id = file.name.replace('.json', '');
                    
                    const card = document.createElement('div');
                    card.className = 'user-card';
                    card.innerHTML = `
                        <div style="padding-left:10px;">
                            <div class="user-id">${id}</div>
                            <span class="status-badge ${userData.active ? 'active' : 'frozen'}">${userData.active ? 'ACTIVE' : 'FROZEN'}</span>
                        </div>
                        <div style="display:flex; gap:8px; padding-right:10px;">
                            <button onclick="showQR('${id}')">📱</button>
                            <button onclick="toggleStatus('${id}', ${userData.active}, '${file.sha}', '${userData.expire_date}')">⏸</button>
                            <button onclick="deleteUser('${id}', '${file.sha}')" style="color:red; border-color:red;">🎯</button>
                        </div>
                    `;
                    list.appendChild(card);
                }
            }
        } catch (e) {
            list.innerHTML = "ОШИБКА: " + e.message;
        }
    }

    async function toggleStatus(id, current, sha, expire) {
        if (!confirm("Сменить статус юзера?")) return;
        const newActive = !current;
        const body = {
            message: `Status: ${id} to ${newActive}`,
            sha: sha,
            content: btoa(JSON.stringify({
                active: newActive,
                expire_date: expire,
                status_text: newActive ? "" : `🟥 Подписка заморожена | ID: ${id}`
            }, null, 2))
        };

        const res = await fetch(`https://api.github.com/repos/${REPO}/contents/database/users/${id}.json`, {
            method: 'PUT',
            headers: { 'Authorization': `token ${getT()}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });

        if (res.ok) { alert("УСПЕХ! Робот обновит подписки через 1 мин."); loadUsers(); }
        else alert("ОШИБКА: " + res.status);
    }

    async function deleteUser(id, sha) {
        if (!confirm("УДАЛИТЬ ЮЗЕРА НАВСЕГДА?")) return;
        const res = await fetch(`https://api.github.com/repos/${REPO}/contents/database/users/${id}.json`, {
            method: 'DELETE',
            headers: { 'Authorization': `token ${getT()}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: "Headshot", sha: sha })
        });
        if (res.ok) { alert("УДАЛЕНО!"); loadUsers(); }
    }

    function showQR(id) {
        const subLink = `v2raytun://import/https://imrekpaladinov-web.github.io/vpn/database/subs/sub_${id}.txt`;
        const qrBox = document.getElementById('qr-code');
        qrBox.innerHTML = "";
        const qr = qrcode(0, 'M');
        qr.addData(subLink);
        qr.make();
        qrBox.innerHTML = qr.createImgTag(6);
        document.getElementById('qr-text').innerText = id;
        document.querySelector('.overlay').style.display = 'block';
        document.getElementById('qr-modal').style.display = 'block';
    }

    function closeQR() {
        document.querySelector('.overlay').style.display = 'none';
        document.getElementById('qr-modal').style.display = 'none';
    }

    window.onload = loadUsers;
</script>
</body>
</html>
