<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Headshot v2.1 | Fix</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --accent: #f85149; --green: #2ea44f; --gray: #30363d; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--gray); padding-bottom: 15px; margin-bottom: 15px; }
        .user-card { background: var(--card); border: 1px solid var(--gray); border-radius: 10px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .user-id { font-size: 1.1em; font-weight: bold; color: white; margin-bottom: 5px; }
        .status-badge { padding: 2px 8px; border-radius: 6px; font-size: 0.7em; text-transform: uppercase; border: 1px solid; }
        .status-active { color: #7ee787; border-color: var(--green); background: rgba(46,164,79,0.1); }
        .status-frozen { color: #ffa198; border-color: var(--accent); background: rgba(248,81,73,0.1); }
        button { background: #21262d; border: 1px solid var(--gray); color: white; padding: 10px; border-radius: 6px; cursor: pointer; min-width: 40px; }
        .btn-kill { color: var(--accent); border-color: var(--accent); }
        #qr-modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background: white; padding: 20px; border-radius: 12px; text-align: center; color: black; z-index: 1000; }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index: 999; }
        .loader { text-align: center; padding: 50px; font-size: 1.2em; color: var(--green); font-weight: bold; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="color:white; margin:0;">💀 HEADSHOT</h1>
        <button onclick="loadUsers()" style="background: var(--green);">🔄 ОБНОВИТЬ</button>
    </div>
    <div id="users-list"><div class="loader">ПОДКЛЮЧЕНИЕ К БАЗЕ...</div></div>
</div>

<div class="overlay" onclick="closeQR()"></div>
<div id="qr-modal">
    <div id="qr-code"></div>
    <p id="qr-text" style="margin-top:10px; font-family: monospace; font-size: 1.2em;"></p>
    <button onclick="closeQR()" style="background:#000; width:100%; color:white;">ЗАКРЫТЬ</button>
</div>

<script>
    // Фикс сборки токена (каждая часть декодируется отдельно)
    const p1 = "Z2hwX2xVSFhlb0pTUWN"; 
    const p2 = "zcm9iYU5GWnhvQzZPTlg3VFlKeDNRUDZxaA=="; 
    const T = atob(p1) + atob(p2);
    const R = "imrekpaladinov-web/vpn"; 

    async function ghRequest(path, method = 'GET', body = null) {
        const url = `https://api.github.com/repos/${R}/contents/${path}`;
        const headers = { 
            'Authorization': `token ${T}`, 
            'Accept': 'application/vnd.github.v3+json',
            'Cache-Control': 'no-cache'
        };
        const config = { method, headers };
        if (body) config.body = JSON.stringify(body);
        
        try {
            const res = await fetch(url, config);
            if (!res.ok) {
                if(res.status === 401) alert("ОШИБКА 401: Токен не подошел. Проверь его на GitHub!");
                return null;
            }
            return await res.json();
        } catch (e) {
            console.error(e);
            return null;
        }
    }

    async function loadUsers() {
        const list = document.getElementById('users-list');
        list.innerHTML = '<div class="loader">СКАНИРОВАНИЕ...</div>';
        
        const files = await ghRequest('database/users?t=' + Date.now());
        if (!Array.isArray(files)) {
            list.innerHTML = "<div style='color:red; text-align:center;'>ОШИБКА ДОСТУПА. ПРОВЕРЬ ТОКЕН И РЕПО.</div>";
            return;
        }

        list.innerHTML = "";
        files.reverse(); 

        for (let file of files) {
            if (file.name.endsWith('.json')) {
                try {
                    const content = await fetch(file.download_url + '?t=' + Date.now()).then(r => r.json());
                    renderUser(file.name.replace('.json', ''), content, file.sha);
                } catch (e) { console.error(e); }
            }
        }
    }

    function renderUser(id, data, sha) {
        const list = document.getElementById('users-list');
        const card = document.createElement('div');
        card.className = 'user-card';
        const sClass = data.active ? 'status-active' : 'status-frozen';
        const sText = data.active ? 'ACTIVE' : 'FROZEN';

        card.innerHTML = `
            <div>
                <div class="user-id">${id}</div>
                <span class="status-badge ${sClass}">${sText}</span>
                <div style="font-size:0.8em; color:#8b949e; margin-top:5px;">📅 ${data.expire_date}</div>
            </div>
            <div style="display:flex; gap:10px;">
                <button onclick="showQR('${id}')">📱</button>
                <button onclick="toggleStatus('${id}', ${data.active}, '${sha}', '${data.expire_date}')">⏸</button>
                <button onclick="deleteUser('${id}', '${sha}')" class="btn-kill">🎯</button>
            </div>
        `;
        list.appendChild(card);
    }

    async function toggleStatus(id, current, sha, expire) {
        const newStatus = !current;
        if (!confirm(`${newStatus ? 'Разморозить' : 'ЗАМОРОЗИТЬ'} ${id}?`)) return;

        const content = btoa(JSON.stringify({ 
            active: newStatus, 
            expire_date: expire,
            status_text: newStatus ? "" : `🟥 Подписка заморожена | ID: ${id}`
        }, null, 2));

        const res = await ghRequest(`database/users/${id}.json`, 'PUT', {
            message: `Admin: ${id} to ${newStatus}`,
            content: content, sha: sha
        });
        if (res) { alert("СТАТУС ИЗМЕНЕН"); loadUsers(); }
    }

    async function deleteUser(id, sha) {
        if (!confirm(`УДАЛИТЬ ${id} НАВСЕГДА?`)) return;
        const res = await ghRequest(`database/users/${id}.json`, 'DELETE', {
            message: `Admin: Headshot ${id}`, sha: sha
        });
        if (res) { alert("УДАЛЕНО"); loadUsers(); }
    }

    function showQR(id) {
        const subLink = `v2raytun://import/https://imrekpaladinov-web.github.io/vpn/database/subs/sub_${id}.txt`;
        const qrBox = document.getElementById('qr-code');
        qrBox.innerHTML = "";
        const qr = qrcode(0, 'M');
        qr.addData(subLink);
        qr.make();
        qrBox.innerHTML = qr.createImgTag(6);
        document.getElementById('qr-text').innerText = id;
        document.querySelector('.overlay').style.display = 'block';
        document.getElementById('qr-modal').style.display = 'block';
    }

    function closeQR() {
        document.querySelector('.overlay').style.display = 'none';
        document.getElementById('qr-modal').style.display = 'none';
    }

    window.onload = loadUsers;
</script>
</body>
</html>
