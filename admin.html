<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Admin | MOBILE FORCE 💀</title>
    <style>
        body { background: #020617; color: #f8fafc; font-family: -apple-system, system-ui, sans-serif; text-align: center; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .admin-card { background: #1e293b; padding: 30px; border-radius: 24px; border: 1px solid #3b82f6; box-shadow: 0 0 30px rgba(59, 130, 246, 0.2); width: 100%; max-width: 350px; box-sizing: border-box; }
        h1 { font-size: 22px; margin-bottom: 20px; color: #3b82f6; text-transform: uppercase; letter-spacing: 2px; }
        input { padding: 15px; border-radius: 12px; border: 2px solid #334155; width: 100%; background: #0f172a; color: white; margin-bottom: 20px; outline: none; box-sizing: border-box; font-size: 18px; text-align: center; }
        input:focus { border-color: #3b82f6; }
        .btn-group { display: flex; gap: 15px; flex-direction: column; }
        button { padding: 16px; cursor: pointer; color: white; border: none; border-radius: 12px; font-weight: 800; transition: 0.2s; width: 100%; font-size: 14px; text-transform: uppercase; }
        .btn-res { background: #22c55e; box-shadow: 0 4px 0 #166534; }
        .btn-del { background: #ef4444; box-shadow: 0 4px 0 #991b1b; }
        button:active { transform: translateY(4px); box-shadow: none; }
        .loader { font-size: 12px; color: #3b82f6; margin-top: 20px; display: none; font-weight: bold; }
        #log { font-size: 11px; color: #94a3b8; margin-top: 15px; font-family: monospace; background: #0f172a; padding: 10px; border-radius: 8px; width: 100%; }
    </style>
</head>
<body>

    <div class="admin-card">
        <h1>Ghost Admin</h1>
        <input type="text" id="targetId" placeholder="ID (например 4150)">
        
        <div class="btn-group">
            <button class="btn-res" onclick="execute(true)">✅ РАЗБАНИТЬ</button>
            <button class="btn-del" onclick="execute(false)">❌ ЗАБАНИТЬ</button>
        </div>
        
        <div id="loader" class="loader">📡 УСТАНОВКА СВЯЗИ...</div>
        <div id="log">Статус: Готов к работе</div>
    </div>

    <script>
        const p1 = "Z2hwX2xVSFhlb0pTUWN"; 
        const p2 = "zcm9iYU5GWnhvQzZPTlg3VFlKeDNRUDZxaA=="; 
        const TOKEN = atob(p1 + p2);
        const REPO = "imrekpaladinov-web/vpn"; 

        async function execute(status) {
            const logElement = document.getElementById('log');
            const loader = document.getElementById('loader');
            const log = (txt) => logElement.innerText = "📟 " + txt;
            
            let rawId = document.getElementById('targetId').value.trim();
            if(!rawId) return alert("Введите ID юзера!");

            // Авто-фикс ID: если ввел "4150", превратит в "GL-4150"
            let id = rawId.startsWith('GL-') ? rawId : 'GL-' + rawId;
            const path = `database/users/${id}.json`;
            const url = `https://api.github.com/repos/${REPO}/contents/${path}`;

            loader.style.display = "block";
            log("Поиск юзера в базе...");

            try {
                // Используем правильные заголовки и метод Bearer
                const res = await fetch(url + `?t=${Date.now()}`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${TOKEN}`,
                        'Accept': 'application/vnd.github+json',
                        'Cache-Control': 'no-cache'
                    }
                });

                if (res.status === 404) throw new Error(`Юзер ${id} не найден!`);
                if (!res.ok) throw new Error("Ошибка GitHub API");

                const file = await res.json();
                
                // Декодирование контента (поддержка кириллицы)
                let contentDecoded = decodeURIComponent(atob(file.content).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                
                let data = JSON.parse(contentDecoded);
                
                // Обновляем статус
                data.active = status;
                data.updated_at = new Date().toISOString();

                log("Подготовка данных...");
                
                // Кодируем обратно в Base64 корректно
                const newContent = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));

                log("Сохранение изменений...");

                const putRes = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${TOKEN}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github+json'
                    },
                    body: JSON.stringify({
                        message: `Admin Action: ${status ? 'Unlock' : 'Ban'} ${id}`,
                        content: newContent,
                        sha: file.sha
                    })
                });

                if (putRes.ok) {
                    log("УСПЕШНО!");
                    alert(`✅ Готово! Юзер ${id} теперь ${status ? 'активен' : 'заблокирован'}.`);
                } else {
                    const errData = await putRes.json();
                    throw new Error(errData.message || "Ошибка записи");
                }

            } catch (e) {
                log("ОШИБКА!");
                console.error(e);
                alert("🚨 ОШИБКА:\n" + e.message);
            } finally {
                loader.style.display = "none";
            }
        }
    </script>
</body>
</html>
