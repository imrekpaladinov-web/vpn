<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ghost Admin 💀</title>
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 50px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .admin-card { background: #1e293b; padding: 40px; border-radius: 24px; border: 1px solid #3b82f6; box-shadow: 0 0 30px rgba(59, 130, 246, 0.2); width: 90%; max-width: 400px; }
        h1 { font-size: 24px; margin-bottom: 20px; color: #3b82f6; text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        input { padding: 12px; border-radius: 10px; border: 1px solid #334155; width: 100%; background: #0f172a; color: white; margin-bottom: 20px; outline: none; box-sizing: border-box; font-size: 16px; font-weight: bold; }
        input:focus { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .btn-group { display: flex; gap: 12px; flex-direction: column; }
        button { padding: 14px; cursor: pointer; color: white; border: none; border-radius: 12px; font-weight: 700; transition: 0.3s; width: 100%; font-size: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-del { background: #ef4444; box-shadow: 0 4px 0 #b91c1c; }
        .btn-del:active { transform: translateY(4px); box-shadow: none; }
        .btn-res { background: #22c55e; box-shadow: 0 4px 0 #15803d; }
        .btn-res:active { transform: translateY(4px); box-shadow: none; }
        .loader { font-size: 14px; color: #3b82f6; margin-top: 20px; display: none; font-weight: bold; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="admin-card">
        <h1>Ghost Admin Panel</h1>
        <p style="font-size: 11px; color: #94a3b8; margin-bottom: 15px; font-weight: bold;">ID: GL-XXXX (цифры или полный ID)</p>
        <input type="text" id="targetId" placeholder="Например: 4150">
        
        <div class="btn-group">
            <button class="btn-res" onclick="toggleAccess(true)">✅ РАЗБАНИТЬ / ВКЛ</button>
            <button class="btn-del" onclick="toggleAccess(false)">❌ ЗАБАНИТЬ / ВЫКЛ</button>
        </div>
        
        <div id="loader" class="loader">📡 СВЯЗЬ С СЕРВЕРОМ GITHUB...</div>
    </div>

    <script>
        // --- ТОКЕН И РЕПОЗИТОРИЙ ---
        const p1 = "Z2hwX2xVSFhlb0pTUWN"; 
        const p2 = "zcm9iYU5GWnhvQzZPTlg3VFlKeDNRUDZxaA=="; 
        const GH_TOKEN = atob(p1 + p2);
        const REPO = "imrekpaladinov-web/vpn"; 

        async function toggleAccess(status) {
            let rawInput = document.getElementById('targetId').value.trim();
            const loader = document.getElementById('loader');
            
            if(!rawInput) return alert("⚠️ Введи ID пользователя!");

            // Умная обработка ID: превращаем 4150 в GL-4150
            let id = rawInput;
            if (/^\d+$/.test(id)) { id = 'GL-' + id; }
            id = id.replace('.json', '');

            const path = `database/users/${id}.json`;
            const apiUrl = `https://api.github.com/repos/${REPO}/contents/${path}`;

            loader.style.display = "block";

            try {
                // 1. ЗАПРОС ФАЙЛА
                const res = await fetch(apiUrl, {
                    method: 'GET',
                    headers: { 
                        'Authorization': `Bearer ${GH_TOKEN}`,
                        'Accept': 'application/vnd.github+json',
                        'Cache-Control': 'no-store'
                    }
                });

                if (!res.ok) {
                    if (res.status === 404) {
                        throw new Error(`Файл "${id}.json" не найден в базе данных!`);
                    } else if (res.status === 401) {
                        throw new Error("Токен заблокирован GitHub! Нужно обновить GH_TOKEN.");
                    } else {
                        throw new Error(`GitHub Error: ${res.status}`);
                    }
                }

                const file = await res.json();

                // 2. ДЕКОДИРОВАНИЕ
                let userData;
                try {
                    userData = JSON.parse(decodeURIComponent(escape(atob(file.content))));
                } catch(e) {
                    userData = JSON.parse(atob(file.content));
                }
                
                // 3. ИЗМЕНЕНИЕ СТАТУСА
                userData.active = status;
                userData.last_mod = new Date().toLocaleString();

                // 4. КОДИРОВАНИЕ ОБРАТНО
                const newContent = btoa(unescape(encodeURIComponent(JSON.stringify(userData, null, 2))));

                // 5. СОХРАНЕНИЕ
                const putRes = await fetch(apiUrl, {
                    method: 'PUT',
                    headers: { 
                        'Authorization': `Bearer ${GH_TOKEN}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github+json'
                    },
                    body: JSON.stringify({
                        message: `Admin Panel: ${status ? 'Activated' : 'Banned'} user ${id}`,
                        content: newContent,
                        sha: file.sha
                    })
                });

                if (putRes.ok) {
                    alert(`🚀 ВЫПОЛНЕНО!\n\nID: ${id}\nСТАТУС: ${status ? 'АКТИВЕН ✅' : 'ЗАБАНЕН ❌'}`);
                } else {
                    const errInfo = await putRes.json();
                    throw new Error("Ошибка записи: " + errInfo.message);
                }

            } catch (e) {
                console.error("Ошибка детально:", e);
                if (e.message === 'Failed to fetch') {
                    alert("❌ ОШИБКА FETCH!\n\nСкорее всего, GitHub блокирует запрос. Попробуй открыть админку в режиме ИНКОГНИТО.");
                } else {
                    alert("❌ ОШИБКА: " + e.message);
                }
            } finally {
                loader.style.display = "none";
            }
        }
    </script>
</body>
</html>
