<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost-Admin | Ultimate Control 💀</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #38bdf8;
            --ghost-glow: rgba(56, 189, 248, 0.3); --danger: #ef4444; --success: #22c55e;
        }
        body { background: var(--bg); color: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { margin-top: 30px; text-align: center; margin-bottom: 20px; }
        .logo { font-size: 2.2rem; font-weight: 900; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; text-shadow: 0 0 15px var(--ghost-glow); }
        .tabs { display: flex; gap: 8px; background: #020617; padding: 5px; border-radius: 12px; width: 92%; max-width: 450px; margin-bottom: 20px; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; border-radius: 8px; transition: 0.3s; color: #64748b; font-weight: bold; font-size: 13px; }
        .tab.active { background: var(--accent); color: #0f172a; }
        .section { display: none; width: 100%; flex-direction: column; align-items: center; }
        .section.active { display: flex; }
        input { width: 100%; padding: 14px; background: #020617; color: white; border: 1px solid #334155; border-radius: 12px; outline: none; box-sizing: border-box; margin-bottom: 10px; font-size: 14px; }
        .profile-card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #334155; width: 90%; max-width: 420px; }
        .config-list { width: 90%; max-width: 450px; display: flex; flex-direction: column; gap: 10px; }
        .config-item { background: #0f172a; padding: 12px; border-radius: 12px; border: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; }
        .conf-name { font-weight: bold; font-size: 14px; color: #f1f5f9; }
        .conf-url { font-size: 10px; color: #64748b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; font-family: monospace; }
        .gear-btn { cursor: pointer; font-size: 18px; color: var(--accent); padding: 5px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        button { padding: 12px; border-radius: 10px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 11px; }
        .btn-res { background: var(--success); }
        .btn-del { background: var(--danger); }
        .btn-date { background: #3b82f6; grid-column: span 2; }
        .status-tag { font-size: 10px; padding: 4px 10px; border-radius: 6px; font-weight: bold; }
        .tag-active { background: #064e3b; color: #10b981; }
        .tag-banned { background: #7f1d1d; color: #ef4444; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; backdrop-filter: blur(5px); }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0f172a; border: 1px solid var(--accent); padding: 25px; border-radius: 20px; z-index: 1000; width: 85%; max-width: 340px; }
    </style>
</head>
<body>

    <header><div class="logo">Ghost-Admin</div></header>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('users', this)">Юзеры / Личные</div>
        <div class="tab" onclick="switchTab('configs', this)">Общие Конфиги</div>
    </div>

    <div id="users-sec" class="section active">
        <div style="width:90%; max-width:450px;"><input type="text" id="targetId" placeholder="Введите ID юзера (без GL-)..." oninput="searchUser()"></div>
        <div class="profile-card" id="profile" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <div style="font-size: 18px; font-weight: 800;" id="display-id">ID: --</div>
                <div id="display-status" class="status-tag">СТАТУС</div>
            </div>
            <div style="font-size: 13px; margin-bottom: 15px;">Доступ до: <b id="display-date">--.--.----</b></div>
            
            <div class="btn-grid">
                <button class="btn-res" onclick="runAction(true)">✅ РАЗБЛОКИРОВАТЬ</button>
                <button class="btn-del" onclick="runAction(false)">❌ ЗАБЛОКИРОВАТЬ</button>
                <button class="btn-date" onclick="editDate()">📅 ИЗМЕНИТЬ ДАТУ</button>
            </div>

            <div style="margin-top: 20px; padding-top: 15px; border-top: 1px solid #334155;">
                <div style="font-size: 12px; font-weight: 800; color: var(--accent); margin-bottom: 12px; text-transform: uppercase;">💎 Персональные конфиги</div>
                <div id="personal-list" class="config-list" style="width:100%;"></div>
                <button class="btn-res" style="width:100%; margin-top:10px;" onclick="openConfigModal(-1, true)">➕ ДОБАВИТЬ ЛИЧНУЮ ЛОКАЦИЮ</button>
            </div>
            <div id="user-log" style="font-size:10px; color:#64748b; margin-top:20px; font-family:monospace; text-align:center;">Ожидание...</div>
        </div>
    </div>

    <div id="configs-sec" class="section">
        <button class="btn-res" style="width: 90%; max-width: 450px; margin-bottom: 15px;" onclick="openConfigModal(-1, false)">➕ ДОБАВИТЬ ОБЩУЮ ЛОКАЦИЮ</button>
        <div class="config-list" id="config-list"></div>
    </div>

    <div class="overlay" id="overlay" onclick="closeModal()"></div>
    <div class="modal" id="modal">
        <h3 id="modal-title" style="margin-top:0; color:var(--accent);">Настройка</h3>
        <input type="text" id="edit-name" placeholder="Название сервера">
        <input type="text" id="edit-url" placeholder="vless://...">
        <button class="btn-res" style="width:100%; margin-bottom:10px;" id="save-btn">💾 СОХРАНИТЬ</button>
        <button class="btn-del" id="del-conf-btn" style="width:100%; margin-bottom:10px;">🗑 УДАЛИТЬ</button>
        <button style="background:#334155; width:100%;" onclick="closeModal()">ОТМЕНА</button>
    </div>

    <script>
        // ИСПОЛЬЗУЕМ ТОКЕН НАПРЯМУЮ ДЛЯ НАДЕЖНОСТИ (раз уж он все равно в коде)
        const T = "ghp_lUHXeoJSQczrobaNFXxoC6ONX7TYJx3QP6qh";
        const R = "imrekpaladinov-web/vpn"; 

        let globalConfig = { server_list: [] };
        let currentUserData = null;
        let editIndex = -1;
        let isPersonalEdit = false;

        function switchTab(sec, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
            document.getElementById(sec + '-sec').classList.add('active');
            if(sec === 'configs') loadGlobalConfigs();
        }

        async function searchUser() {
            let idInput = document.getElementById('targetId').value.trim();
            const card = document.getElementById('profile');
            if(idInput.length < 1) { card.style.display = 'none'; return; }
            const fullId = idInput.startsWith('GL-') ? idInput : 'GL-' + idInput;

            try {
                const res = await fetch(`https://api.github.com/repos/${R}/contents/database/users/${fullId}.json?t=${Date.now()}`, {
                    headers: { 'Authorization': `token ${T}` }
                });
                if(res.ok) {
                    const file = await res.json();
                    // Безопасное декодирование UTF-8
                    currentUserData = JSON.parse(decodeURIComponent(escape(atob(file.content))));
                    currentUserData.user_id = fullId;
                    card.style.display = 'block';
                    updateProfileUI(fullId);
                } else { card.style.display = 'none'; }
            } catch(e) { card.style.display = 'none'; }
        }

        function updateProfileUI(id) {
            document.getElementById('display-id').innerText = "ID: " + id;
            document.getElementById('display-date').innerText = currentUserData.expire_date || "---";
            const st = document.getElementById('display-status');
            st.innerText = currentUserData.active ? "АКТИВЕН" : "ЗАБАНЕН";
            st.className = "status-tag " + (currentUserData.active ? "tag-active" : "tag-banned");
            
            const list = document.getElementById('personal-list');
            list.innerHTML = "";
            const personal = currentUserData.personal_servers || [];
            personal.forEach((url, i) => {
                const parts = url.split('#');
                const link = parts[0];
                const name = parts[1] || 'Личный';
                list.innerHTML += `<div class="config-item"><div><div class="conf-name">${name}</div><div class="conf-url">${link}</div></div><div class="gear-btn" onclick="openConfigModal(${i}, true)">⚙️</div></div>`;
            });
        }

        async function loadGlobalConfigs() {
            const list = document.getElementById('config-list');
            list.innerHTML = "<div style='text-align:center; opacity:0.5;'>Загрузка...</div>";
            try {
                const res = await fetch(`https://api.github.com/repos/${R}/contents/access_control.json?t=${Date.now()}`, { headers: { 'Authorization': `token ${T}` } });
                const file = await res.json();
                globalConfig = JSON.parse(decodeURIComponent(escape(atob(file.content))));
                list.innerHTML = "";
                globalConfig.server_list.forEach((url, i) => {
                    const parts = url.split('#');
                    list.innerHTML += `<div class="config-item"><div><div class="conf-name">⚡️ ${parts[1] || 'Сервер'}</div><div class="conf-url">${parts[0]}</div></div><div class="gear-btn" onclick="openConfigModal(${i}, false)">⚙️</div></div>`;
                });
            } catch(e) { list.innerHTML = "Ошибка загрузки"; }
        }

        function openConfigModal(idx, personal) {
            editIndex = idx;
            isPersonalEdit = personal;
            document.getElementById('modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
            const nameInp = document.getElementById('edit-name');
            const urlInp = document.getElementById('edit-url');
            if(idx === -1) {
                nameInp.value = ""; urlInp.value = ""; 
                document.getElementById('del-conf-btn').style.display = 'none';
            } else {
                const entry = personal ? currentUserData.personal_servers[idx] : globalConfig.server_list[idx];
                const parts = entry.split('#');
                urlInp.value = parts[0]; nameInp.value = parts[1] || "";
                document.getElementById('del-conf-btn').style.display = 'block';
            }
            document.getElementById('save-btn').onclick = saveConfig;
            document.getElementById('del-conf-btn').onclick = deleteConfig;
        }

        async function saveConfig() {
            const name = document.getElementById('edit-name').value.trim();
            const link = document.getElementById('edit-url').value.trim();
            if(!link) return;
            const entry = name ? `${link}#${name}` : link;

            if(isPersonalEdit) {
                if(!currentUserData.personal_servers) currentUserData.personal_servers = [];
                if(editIndex === -1) currentUserData.personal_servers.push(entry);
                else currentUserData.personal_servers[editIndex] = entry;
                await pushUpdate(`database/users/${currentUserData.user_id}.json`, currentUserData);
                await searchUser();
            } else {
                if(editIndex === -1) globalConfig.server_list.push(entry);
                else globalConfig.server_list[editIndex] = entry;
                await pushUpdate(`access_control.json`, globalConfig);
                await loadGlobalConfigs();
            }
            closeModal();
        }

        async function deleteConfig() {
            if(!confirm("Удалить?")) return;
            if(isPersonalEdit) {
                currentUserData.personal_servers.splice(editIndex, 1);
                await pushUpdate(`database/users/${currentUserData.user_id}.json`, currentUserData);
                await searchUser();
            } else {
                globalConfig.server_list.splice(editIndex, 1);
                await pushUpdate(`access_control.json`, globalConfig);
                await loadGlobalConfigs();
            }
            closeModal();
        }

        async function pushUpdate(path, data) {
            const log = document.getElementById('user-log');
            log.innerText = "⏳ Синхронизация...";
            try {
                // Прямое получение актуального SHA
                const infoRes = await fetch(`https://api.github.com/repos/${R}/contents/${path}?t=${Date.now()}`, {
                    headers: { 'Authorization': `token ${T}` }
                });
                const info = await infoRes.json();
                
                // Безопасная кодировка JSON в Base64 для GitHub (поддерживает кириллицу)
                const jsonStr = JSON.stringify(data, null, 2);
                const bytes = new TextEncoder().encode(jsonStr);
                const base64 = btoa(String.fromCharCode(...bytes));

                const res = await fetch(`https://api.github.com/repos/${R}/contents/${path}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${T}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: "Ghost Admin Update", content: base64, sha: info.sha })
                });

                if(res.ok) {
                    log.innerText = "✅ Успешно сохранено";
                    return true;
                } else {
                    log.innerText = "❌ Ошибка API: " + res.status;
                    return false;
                }
            } catch(e) {
                log.innerText = "❌ Ошибка сети";
                return false;
            }
        }

        async function runAction(v) { 
            currentUserData.active = v; 
            if(await pushUpdate(`database/users/${currentUserData.user_id}.json`, currentUserData)) searchUser();
        }

        async function editDate() {
            const d = prompt("Формат: ДД.ММ.ГГГГ", currentUserData.expire_date);
            if(d && /^\d{2}\.\d{2}\.\d{4}$/.test(d)) {
                currentUserData.expire_date = d;
                if(await pushUpdate(`database/users/${currentUserData.user_id}.json`, currentUserData)) searchUser();
            }
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
    </script>
</body>
</html>
