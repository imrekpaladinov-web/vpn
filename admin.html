<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost-Admin | Ultimate Control 💀</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --ghost-glow: rgba(56, 189, 248, 0.3);
            --danger: #ef4444;
            --success: #22c55e;
        }

        body { 
            background: var(--bg); 
            color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header { margin-top: 40px; position: relative; text-align: center; margin-bottom: 20px; }
        .logo { font-size: 2.5rem; font-weight: 900; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; text-shadow: 0 0 15px var(--ghost-glow); }

        /* ТАБЫ */
        .tabs { display: flex; gap: 10px; background: #020617; padding: 5px; border-radius: 15px; width: 90%; max-width: 450px; margin-bottom: 25px; }
        .tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; border-radius: 10px; transition: 0.3s; color: #64748b; font-weight: bold; font-size: 14px; }
        .tab.active { background: var(--accent); color: #0f172a; }

        .section { display: none; width: 100%; flex-direction: column; align-items: center; }
        .section.active { display: flex; }

        /* ПОИСК И КАРТОЧКА ЮЗЕРА */
        .search-box { width: 90%; max-width: 450px; }
        input { width: 100%; padding: 16px; background: #020617; color: white; border: 1px solid #334155; border-radius: 15px; outline: none; box-sizing: border-box; transition: 0.3s; margin-bottom: 15px; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--ghost-glow); }

        .profile-card { background: var(--card); padding: 25px; border-radius: 25px; border: 1px solid #334155; width: 90%; max-width: 400px; animation: slideUp 0.4s ease-out; }
        
        /* КОНФИГИ (СПИСОК) */
        .config-list { width: 90%; max-width: 450px; display: flex; flex-direction: column; gap: 12px; }
        .config-item { background: var(--card); padding: 15px 20px; border-radius: 18px; border: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .config-item:hover { border-color: var(--accent); }
        .config-info { display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
        .conf-name { font-weight: bold; color: #f8fafc; font-size: 15px; }
        .conf-url { font-size: 10px; color: #64748b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: monospace; }
        .gear-btn { cursor: pointer; font-size: 20px; color: var(--accent); padding: 5px; transition: 0.3s; }
        .gear-btn:hover { transform: rotate(90deg); }

        /* КНОПКИ */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        button { padding: 12px; border-radius: 12px; border: none; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 12px; }
        .btn-res { background: var(--success); }
        .btn-del { background: var(--danger); }
        .btn-date { background: #3b82f6; grid-column: span 2; }
        .btn-add { background: var(--success); width: 90%; max-width: 450px; margin-bottom: 20px; font-size: 14px; }

        /* МОДАЛКА */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; backdrop-filter: blur(4px); }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #020617; border: 1px solid var(--accent); padding: 25px; border-radius: 25px; z-index: 1000; width: 85%; max-width: 350px; box-shadow: 0 0 30px var(--ghost-glow); }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .status-tag { font-size: 10px; padding: 3px 8px; border-radius: 5px; font-weight: bold; display: inline-block; margin-top: 5px; }
        .tag-active { background: #064e3b; color: #10b981; }
        .tag-banned { background: #7f1d1d; color: #ef4444; }
    </style>
</head>
<body>

    <header><div class="logo">Ghost-Admin</div></header>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('users', this)">Юзеры</div>
        <div class="tab" onclick="switchTab('configs', this)">Конфиги</div>
    </div>

    <div id="users-sec" class="section active">
        <div class="search-box">
            <input type="text" id="targetId" placeholder="Введите ID юзера (напр. 4150)" oninput="searchUser()">
        </div>
        <div class="profile-card" id="profile" style="display:none;">
            <div style="font-size: 20px; font-weight: bold;" id="display-id">ID: --</div>
            <div id="display-status" class="status-tag">СТАТУС</div>
            <div style="margin: 15px 0; font-size: 14px;">Срок: <b id="display-date">--.--.----</b></div>
            <div id="user-log" style="font-size:11px; color:#64748b; font-family:monospace;">Лог: Ожидание...</div>
            <div class="btn-grid">
                <button class="btn-res" onclick="runAction(true)">✅ РАЗБАНИТЬ</button>
                <button class="btn-del" onclick="runAction(false)">❌ ЗАБАНИТЬ</button>
                <button class="btn-date" onclick="editDate()">📅 ИЗМЕНИТЬ СРОК</button>
            </div>
        </div>
    </div>

    <div id="configs-sec" class="section">
        <button class="btn btn-add" onclick="openConfigModal(-1)">➕ ДОБАВИТЬ ЛОКАЦИЮ</button>
        <div class="config-list" id="config-list">
            </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeModal()"></div>
    <div class="modal" id="modal">
        <h3 id="modal-title" style="margin-top:0; color:var(--accent);">Настройка узла</h3>
        <label style="font-size:12px; color:#64748b;">Название (после #):</label>
        <input type="text" id="edit-name" placeholder="Напр: 🇩🇪 Германия-1">
        <label style="font-size:12px; color:#64748b;">Ссылка (vless://):</label>
        <input type="text" id="edit-url" placeholder="vless://...">
        
        <button class="btn btn-res" style="width:100%; margin-bottom:10px;" onclick="saveConfig()">💾 СОХРАНИТЬ</button>
        <button class="btn btn-del" id="del-conf-btn" style="width:100%; margin-bottom:10px;" onclick="deleteConfig()">🗑 УДАЛИТЬ</button>
        <button class="btn" style="background:#334155; width:100%;" onclick="closeModal()">ОТМЕНА</button>
    </div>

    <script>
        const p1 = "Z2hwX2xVSFhlb0pTUWN"; 
        const p2 = "zcm9iYU5GWnhvQzZPTlg3VFlKeDNRUDZxaA=="; 
        const T = atob(p1 + p2);
        const R = "imrekpaladinov-web/vpn"; 

        let globalConfig = { server_list: [] };
        let configSHA = "";
        let editIndex = -1;

        // ПЕРЕКЛЮЧЕНИЕ ТАБОВ
        function switchTab(sec, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
            document.getElementById(sec + '-sec').classList.add('active');
            if(sec === 'configs') loadConfigs();
        }

        // ЛОГИКА ЮЗЕРОВ
        async function searchUser() {
            let idInput = document.getElementById('targetId').value.trim();
            const card = document.getElementById('profile');
            if(idInput.length < 4) { card.style.display = 'none'; return; }
            const fullId = idInput.startsWith('GL-') ? idInput : 'GL-' + idInput;

            try {
                const res = await fetch(`https://raw.githubusercontent.com/${R}/main/database/users/${fullId}.json?t=${Date.now()}`);
                if(res.ok) {
                    const data = await res.json();
                    card.style.display = 'block';
                    document.getElementById('display-id').innerText = "ID: " + fullId;
                    document.getElementById('display-date').innerText = data.expire_date || "---";
                    const status = document.getElementById('display-status');
                    status.innerText = data.active ? "СТАТУС: АКТИВЕН" : "СТАТУС: ЗАБАНЕН";
                    status.className = "status-tag " + (data.active ? "tag-active" : "tag-banned");
                } else { card.style.display = 'none'; }
            } catch(e) { card.style.display = 'none'; }
        }

        async function updateUserData(updates) {
            const log = document.getElementById('user-log');
            let id = document.getElementById('targetId').value.trim();
            const fullId = id.startsWith('GL-') ? id : 'GL-' + id;
            log.innerText = "📟 Соединение...";
            const url = `https://api.github.com/repos/${R}/contents/database/users/${fullId}.json`;
            
            try {
                const res = await fetch(url, { headers: { 'Authorization': `token ${T}` } });
                const file = await res.json();
                let content = JSON.parse(decodeURIComponent(escape(atob(file.content))));
                Object.assign(content, updates);

                const putRes = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${T}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `Admin Update: ${fullId}`, content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))), sha: file.sha })
                });
                if(putRes.ok) { log.innerText = "✅ ВЫПОЛНЕНО"; setTimeout(searchUser, 500); }
            } catch(e) { log.innerText = "❌ ОШИБКА"; }
        }

        function runAction(v) { updateUserData({ active: v }); }
        function editDate() {
            const d = prompt("Новая дата (ДД.ММ.ГГГГ):", document.getElementById('display-date').innerText);
            if(d && /^\d{2}\.\d{2}\.\d{4}$/.test(d)) updateUserData({ expire_date: d });
        }

        // ЛОГИКА КОНФИГОВ
        async function loadConfigs() {
            const list = document.getElementById('config-list');
            list.innerHTML = "<div style='text-align:center; opacity:0.5; padding:20px;'>Загрузка узлов...</div>";
            try {
                const res = await fetch(`https://api.github.com/repos/${R}/contents/access_control.json?t=${Date.now()}`, {
                    headers: { 'Authorization': `token ${T}` }
                });
                const data = await res.json();
                configSHA = data.sha;
                globalConfig = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                renderConfigs();
            } catch(e) { list.innerHTML = "<div style='color:red; text-align:center;'>Ошибка</div>"; }
        }

        function renderConfigs() {
            const list = document.getElementById('config-list');
            list.innerHTML = "";
            if(!globalConfig.server_list) return;
            globalConfig.server_list.forEach((url, i) => {
                const [link, name] = url.split('#');
                list.innerHTML += `
                    <div class="config-item">
                        <div class="config-info">
                            <span class="conf-name">⚡️ ${name || 'Локация'}</span>
                            <span class="conf-url">${link}</span>
                        </div>
                        <div class="gear-btn" onclick="openConfigModal(${i})">⚙️</div>
                    </div>`;
            });
        }

        function openConfigModal(idx) {
            editIndex = idx;
            document.getElementById('modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
            if(idx === -1) {
                document.getElementById('modal-title').innerText = "Новый узел";
                document.getElementById('edit-name').value = "";
                document.getElementById('edit-url').value = "";
                document.getElementById('del-conf-btn').style.display = 'none';
            } else {
                const [link, name] = globalConfig.server_list[idx].split('#');
                document.getElementById('edit-name').value = name || "";
                document.getElementById('edit-url').value = link;
                document.getElementById('del-conf-btn').style.display = 'block';
            }
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }

        async function saveConfig() {
            const name = document.getElementById('edit-name').value.trim();
            const link = document.getElementById('edit-url').value.trim();
            if(!link) return alert("Нужна ссылка!");
            const entry = `${link}#${name}`;
            if(editIndex === -1) globalConfig.server_list.push(entry);
            else globalConfig.server_list[editIndex] = entry;
            
            const content = btoa(unescape(encodeURIComponent(JSON.stringify(globalConfig, null, 2))));
            const res = await fetch(`https://api.github.com/repos/${R}/contents/access_control.json`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${T}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: "Admin: Config Update", content: content, sha: configSHA })
            });
            if(res.ok) { closeModal(); loadConfigs(); }
        }

        async function deleteConfig() {
            if(!confirm("Удалить?")) return;
            globalConfig.server_list.splice(editIndex, 1);
            const content = btoa(unescape(encodeURIComponent(JSON.stringify(globalConfig, null, 2))));
            const res = await fetch(`https://api.github.com/repos/${R}/contents/access_control.json`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${T}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: "Admin: Config Delete", content: content, sha: configSHA })
            });
            if(res.ok) { closeModal(); loadConfigs(); }
        }
    </script>
</body>
</html>
