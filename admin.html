<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Admin | FIX 💀</title>
    <style>
        body { background: #020617; color: #f8fafc; font-family: sans-serif; text-align: center; padding: 20px; }
        .admin-card { background: #1e293b; padding: 25px; border-radius: 20px; border: 1px solid #3b82f6; max-width: 350px; margin: auto; margin-top: 50px; }
        input { padding: 12px; width: 90%; background: #0f172a; color: white; border: 1px solid #334155; border-radius: 8px; margin-bottom: 15px; text-align: center; }
        button { padding: 15px; width: 100%; border-radius: 10px; border: none; color: white; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-res { background: #22c55e; }
        .btn-del { background: #ef4444; }
        #log { font-size: 12px; color: #94a3b8; margin-top: 15px; font-family: monospace; }
    </style>
</head>
<body>

    <div class="admin-card">
        <h3>Ghost Admin</h3>
        <input type="text" id="targetId" placeholder="ID (например 5292)">
        <button class="btn-res" onclick="run(true)">✅ РАЗБАНИТЬ</button>
        <button class="btn-del" onclick="run(false)">❌ ЗАБАНИТЬ</button>
        <div id="log">Статус: Готов</div>
    </div>

    <script>
        const p1 = "Z2hwX2xVSFhlb0pTUWN"; 
        const p2 = "zcm9iYU5GWnhvQzZPTlg3VFlKeDNRUDZxaA=="; 
        const T = atob(p1 + p2);
        const R = "imrekpaladinov-web/vpn"; 

        async function run(active) {
            const statusLog = document.getElementById('log');
            let id = document.getElementById('targetId').value.trim();
            if(!id) return alert("Введи ID!");
            if(!id.startsWith('GL-')) id = 'GL-' + id;

            const url = `https://api.github.com/repos/${R}/contents/database/users/${id}.json`;
            statusLog.innerText = "📟 Связь...";

            try {
                // 1. ПОЛУЧАЕМ
                const res = await fetch(url, {
                    headers: { 'Authorization': `token ${T}` }
                });

                if (!res.ok) throw new Error("Юзер не найден");
                const file = await res.json();
                
                // Декодируем (UTF-8)
                let content = JSON.parse(decodeURIComponent(escape(atob(file.content))));
                content.active = active;

                statusLog.innerText = "📟 Сохранение...";

                // 2. ОБНОВЛЯЕМ
                const putRes = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${T}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Fix ${id}`,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))),
                        sha: file.sha
                    })
                });

                if (putRes.ok) {
                    statusLog.innerText = "✅ УСПЕШНО!";
                    alert("Готово, брат!");
                } else {
                    throw new Error("Ошибка записи");
                }

            } catch (e) {
                statusLog.innerText = "❌ ОШИБКА";
                alert(e.message);
            }
        }
    </script>
</body>
</html>
