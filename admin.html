<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost-Admin | Control Center 💀</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --ghost-glow: rgba(56, 189, 248, 0.3);
        }

        body { 
            background: var(--bg); 
            color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            margin-top: 60px;
            position: relative;
            text-align: center;
        }

        .logo {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 6px;
            color: var(--accent);
            text-transform: uppercase;
            position: relative;
            z-index: 2;
            text-shadow: 0 0 15px var(--ghost-glow);
        }

        .logo-bg-glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 150%; height: 100%;
            background: var(--accent);
            filter: blur(60px);
            opacity: 0.15;
            z-index: 1;
        }

        .search-box {
            margin-top: 40px;
            width: 90%;
            max-width: 450px;
        }

        input { 
            width: 100%;
            padding: 18px; 
            background: #020617; 
            color: white; 
            border: 1px solid #334155; 
            border-radius: 15px; 
            outline: none;
            font-size: 16px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent); box-shadow: 0 0 20px var(--ghost-glow); }

        .profile-card { 
            background: var(--card); 
            padding: 30px; 
            border-radius: 25px; 
            border: 1px solid #334155; 
            width: 90%;
            max-width: 400px; 
            margin-top: 30px;
            display: none;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .profile-id { font-size: 22px; font-weight: bold; margin-bottom: 5px; color: var(--accent); }
        .status-tag { font-size: 11px; padding: 4px 10px; border-radius: 5px; text-transform: uppercase; font-weight: bold; }
        .tag-active { background: #064e3b; color: #10b981; }
        .tag-banned { background: #7f1d1d; color: #ef4444; }

        .info-row { margin: 15px 0; font-size: 14px; color: #94a3b8; }
        .info-row b { color: #f8fafc; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        
        button { 
            padding: 14px; 
            border-radius: 12px; 
            border: none; 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.2s;
            font-size: 12px;
        }

        .btn-res { background: #22c55e; }
        .btn-del { background: #ef4444; }
        .btn-date { background: #3b82f6; grid-column: span 2; }
        
        button:hover { filter: brightness(1.2); transform: scale(1.02); }

        #log { font-size: 11px; color: #94a3b8; margin-top: 20px; font-family: monospace; letter-spacing: 1px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-bg-glow"></div>
        <div class="logo">Ghost-Admin</div>
    </header>

    <div class="search-box">
        <input type="text" id="targetId" placeholder="Введите ID (например 4150)" oninput="search()">
    </div>

    <div class="profile-card" id="profile">
        <div class="profile-id" id="display-id">ID: GL-4150</div>
        <div id="display-status" class="status-tag">АКТИВЕН</div>
        
        <div class="info-row">
            Срок истечения: <b id="display-date">--.--.----</b>
        </div>

        <div id="log">Статус: Ожидание...</div>

        <div class="btn-grid">
            <button class="btn-res" onclick="run(true)">✅ РАЗБАНИТЬ</button>
            <button class="btn-del" onclick="run(false)">❌ ЗАБАНИТЬ</button>
            <button class="btn-date" onclick="editDate()">📅 ИЗМЕНИТЬ СРОК</button>
        </div>
    </div>

    <script>
        // Твои токены
        const p1 = "Z2hwX2xVSFhlb0pTUWN"; 
        const p2 = "zcm9iYU5GWnhvQzZPTlg3VFlKeDNRUDZxaA=="; 
        const T = atob(p1 + p2);
        const R = "imrekpaladinov-web/vpn"; 

        async function search() {
            let id = document.getElementById('targetId').value.trim();
            const card = document.getElementById('profile');
            if(id.length < 4) { card.style.display = 'none'; return; }
            if(!id.startsWith('GL-')) id = 'GL-' + id;

            try {
                const res = await fetch(`https://raw.githubusercontent.com/${R}/main/database/users/${id}.json?t=${Date.now()}`);
                if(res.ok) {
                    const data = await res.json();
                    card.style.display = 'block';
                    document.getElementById('display-id').innerText = "ID: " + id;
                    document.getElementById('display-date').innerText = data.expire_date || "Не установлен";
                    const status = document.getElementById('display-status');
                    status.innerText = data.active ? "СТАТУС: АКТИВЕН" : "СТАТУС: ЗАБАНЕН";
                    status.className = "status-tag " + (data.active ? "tag-active" : "tag-banned");
                }
            } catch(e) { card.style.display = 'none'; }
        }

        // Общая функция для обновления ЛЮБЫХ данных в JSON
        async function updateDatabase(updates) {
            const statusLog = document.getElementById('log');
            let id = document.getElementById('targetId').value.trim();
            if(!id.startsWith('GL-')) id = 'GL-' + id;

            const url = `https://api.github.com/repos/${R}/contents/database/users/${id}.json`;
            statusLog.innerText = "📟 Связь с сервером...";

            try {
                const res = await fetch(url, { headers: { 'Authorization': `token ${T}` } });
                if (!res.ok) throw new Error("Юзер не найден");
                const file = await res.json();
                
                let content = JSON.parse(decodeURIComponent(escape(atob(file.content))));
                
                // Применяем новые данные (active или expire_date)
                Object.assign(content, updates);

                statusLog.innerText = "📟 Сохранение...";

                const putRes = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${T}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `Admin Update: ${id}`,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))),
                        sha: file.sha
                    })
                });

                if (putRes.ok) {
                    statusLog.innerText = "✅ СИСТЕМА ОБНОВЛЕНА!";
                    setTimeout(search, 1000); // Обновляем карточку через секунду
                } else { throw new Error("Ошибка записи в GitHub"); }
            } catch (e) {
                statusLog.innerText = "❌ ОШИБКА";
                alert(e.message);
            }
        }

        // Вызов бана/разбана
        function run(activeValue) {
            updateDatabase({ active: activeValue });
        }

        // Вызов изменения даты
        function editDate() {
            const newDate = prompt("Введите новую дату (например: 20.05.2026):", document.getElementById('display-date').innerText);
            if(newDate && /^\d{2}\.\d{2}\.\d{4}$/.test(newDate)) {
                updateDatabase({ expire_date: newDate });
            } else if (newDate) {
                alert("Неверный формат! Используй ДД.ММ.ГГГГ");
            }
        }
    </script>
</body>
</html>
