<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Link | Твой быстрый VPN 👻</title>
    <style>
        /* (Твои стили я оставляю без изменений, они отличные) */
        :root { --bg-color: radial-gradient(circle at top, #1e293b 0%, #020617 100%); --card-bg: rgba(23, 23, 23, 0.8); --text-color: #f8fafc; --accent-blue: #3b82f6; }
        body { background: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', Roboto, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow-x: hidden; }
        .card { background: var(--card-bg); backdrop-filter: blur(10px); border-radius: 24px; padding: 30px; width: 90%; max-width: 400px; border: 1px solid var(--accent-blue); text-align: center; box-shadow: 0 0 25px rgba(59, 130, 246, 0.15); }
        .logo { font-size: 32px; font-weight: 900; color: #ffffff; margin-bottom: 10px; text-shadow: 0 0 15px var(--accent-blue); }
        .subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 25px; }
        .status-box { background: #111827; border-radius: 16px; padding: 15px; margin-bottom: 25px; border: 1px solid #1e293b; text-align: left; }
        .status-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; }
        .value { color: var(--accent-blue); font-weight: 600; }
        .btn { display: flex; align-items: center; justify-content: center; background: #2563eb; color: white; text-decoration: none; padding: 15px; border-radius: 12px; font-weight: 600; margin-bottom: 12px; transition: 0.2s; font-size: 15px; border: none; cursor: pointer; width: 100%; }
        .btn-v2 { background: #4f46e5; }
        .btn-tg { background: #0ea5e9; margin-top: 10px; }
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #020617; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: 0.8s; }
        .fade-out { opacity: 0; visibility: hidden; }
        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .dot-green { background: #4ade80; box-shadow: 0 0 8px #4ade80; }
        .dot-gray { background: #64748b; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div style="font-size: 48px; font-weight: 900; color: white; margin-bottom: 20px;">👻 Ghost Link</div>
        <div style="width: 40px; height: 40px; border: 3px solid #3b82f6; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    </div>

    <div class="card">
        <div class="logo">👻 Ghost Link</div>
        <div class="subtitle">Приватный доступ нового поколения</div>
        
        <div class="status-box">
            <div class="status-row"><span>Тариф:</span> <span class="value">Premium VIP</span></div>
            <div class="status-row"><span>Скорость:</span> <span class="value" id="pingValue">24 ms</span></div>
            <div class="status-row"><span>Истекает:</span> <span class="value" id="expireDate">--.--.----</span></div>
            <div id="pygmalionStatus" style="font-size: 11px; margin-top: 10px; color: #94a3b8;">
                <span class="dot dot-gray" id="statusDot"></span> <span id="statusText">Запуск систем...</span>
            </div>
        </div>

        <button onclick="handleVpnClick('Android')" class="btn btn-v2">🤖 Импорт для V2RayTun</button>
        <button onclick="handleVpnClick('iOS')" class="btn">🍏 Импорт для Happ</button>
        <a href="https://t.me/svumt" class="btn btn-tg">💬 Техподдержка 24/7</a>

        <div style="font-size: 11px; color: #475569; margin-top: 20px;">© 2026 Ghost Link VPN.</div>
    </div>

    <script>
        // --- КОНФИГУРАЦИЯ ---
        const GH_TOKEN = atob("Z2hwX2xVSFhlb0pTUWN6cm9iYU5GWnhvQzZPTlg3VFlKeDNRUDZxaA==");
        const TG_TOKEN = "8690560527:AAE6_jgQ3nK5vwFBX2D4PoSbGKnLApMqqr4";
        const TG_ID = "8758774981";
        const REPO = "imrekpaladinov-web/vpn"; 

        // ГЛАВНАЯ ФУНКЦИЯ
        function handleVpnClick(platform) {
            const userId = localStorage.getItem('ghost_user_id') || ('GL-' + Math.floor(Math.random() * 9000 + 1000));
            localStorage.setItem('ghost_user_id', userId);

            const vpnUrl = platform === 'Android' 
                ? "https://vpnone.ru/connect/?url=v2raytun%3A%2F%2Fimport%2Fhttps://raw.githubusercontent.com/imrekpaladinov-web/vpn/main/vpn.txt"
                : "https://vpnone.ru/connect/?url=happ%3A%2F%2Fadd%2Fhttps://raw.githubusercontent.com/imrekpaladinov-web/vpn/main/vpn.txt";

            // 1. Отправка в GitHub (в фоне)
            const fileName = `database/users/${userId}.txt`;
            const contentBase64 = btoa(unescape(encodeURIComponent(`ID: ${userId}\nPlatform: ${platform}\nDate: ${new Date().toLocaleString()}`)));
            
            fetch(`https://api.github.org/repos/${REPO}/contents/${fileName}`, {
                method: 'PUT',
                headers: { 'Authorization': 'token ' + GH_TOKEN, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `New User ${userId}`, content: contentBase64 })
            }).catch(() => {});

            // 2. Отправка в Telegram (в фоне) с кнопкой удаления
            const msg = `🛸 *Ghost Link: Новый клиент!*\n🆔 ID: \`${userId}\`\n📱 Система: *${platform}*`;
            const keyboard = { inline_keyboard: [[{ text: "❌ Удалить доступ", callback_data: `del_${userId}` }]] };

            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: TG_ID, text: msg, parse_mode: 'Markdown', reply_markup: keyboard })
            }).catch(() => {});

            // 3. МГНОВЕННЫЙ РЕДИРЕКТ
            setTimeout(() => { window.location.href = vpnUrl; }, 150);
        }

        // Вспомогательные функции (Splash, Ping, Date)
        window.onload = () => {
            setTimeout(() => document.getElementById('splash-screen').classList.add('fade-out'), 1500);
            
            const d = new Date(); d.setDate(d.getDate() + 30);
            document.getElementById('expireDate').innerText = d.toLocaleDateString();

            setInterval(() => {
                document.getElementById('pingValue').innerText = Math.floor(Math.random() * 20 + 20) + ' ms';
            }, 3000);

            checkPygmalion();
        };

        async function checkPygmalion() {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            try {
                const res = await fetch('status.json', { cache: "no-store" });
                if (res.ok) {
                    dot.className = 'dot dot-green';
                    text.innerText = 'Системы в норме';
                }
            } catch (e) {
                text.innerText = 'Мониторинг активен';
            }
        }
    </script>
    <style> @keyframes spin { to { transform: rotate(360deg); } } </style>
</body>
</html>
